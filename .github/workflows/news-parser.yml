name: Run News Parser

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run parser
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/news-parser.js

      - name: Commit news.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "Update news.json"
          git push
