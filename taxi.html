<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Service | Internationals Pro</title>
    <style>
        :root {
            --primary-color: #003580; /* Твой синий */
            --hover-color: #ff0000;   /* Красный при наведении */
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            font-family: Arial, sans-serif; 
            background-color: #f4f7f9; 
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px; /* Отступы по краям */
        }

        /* Огромный логотип без белой полосы */
        .top-bar img {
            height: 120px; /* В два раза больше, чем было */
            width: auto;
            display: block;
        }

        /* Большая синяя стрелка */
        .back-link {
            text-decoration: none;
            color: var(--primary-color);
            font-size: 60px; /* В два раза больше */
            font-weight: bold;
            transition: color 0.3s ease;
            line-height: 1;
        }

        .back-link:hover {
            color: var(--hover-color);
        }

        .wrapper { 
            width: 100%; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 20px 40px 20px; 
            box-sizing: border-box; 
        }

        .widget-container {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        iframe {
            width: 100%;
            border: none;
            min-height: 600px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-link">←</a>
        <a href="index.html">
            <img src="assets/logo.png" alt="Internationals Pro">
        </a>
        <div style="width: 60px;"></div> </div>

    <div class="wrapper notranslate">
        <div class="widget-container">
            <iframe id="intuiIframe" 
                src="https://www.intui.travel/?p_site=28722858&constructor=1&color_scheme=blue&b=011010110011111111&currency=RUB" 
                scrolling="no">
            </iframe>
        </div>
    </div>

    <script type="text/javascript" src="https://www.intui.travel/public/js/jquery/iframeResizer.js"></script>
    <script type="text/javascript">
        window.onload = function() {
            if (window.iFrameResize) {
                iFrameResize({ log: false, checkOrigin: false }, '#intuiIframe');
            }
        };
    </script>
</body>
</html>
