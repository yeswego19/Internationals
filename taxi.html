<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Service | Internationals Pro</title>
    <style>
        :root {
            --primary-color: #003580;
            --hover-color: #ff0000;
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            font-family: Arial, sans-serif; 
            background-color: #f4f7f9; 
        }

        /* Блок для логотипа (слева) */
        .header-area {
            padding: 20px 40px 0 40px;
            display: flex;
            justify-content: flex-start;
        }

        .header-area img {
            height: auto;
            width: 240px; /* Твой огромный логотип */
            display: block;
        }

        .wrapper { 
            width: 100%; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 20px 40px 20px; 
            box-sizing: border-box;
        }

        /* Блок для стрелки над правым верхним углом формы */
        .action-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: -10px; /* Прижимаем стрелку ближе к форме */
        }

        .back-link {
            text-decoration: none;
            color: var(--primary-color);
            font-size: 70px;
            font-weight: bold;
            transition: color 0.3s ease;
            line-height: 1;
        }

        .back-link:hover {
            color: var(--hover-color);
        }

        .widget-container {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }

        /* Настройка фрейма, чтобы влезла карта и кнопки оплаты */
        iframe {
            width: 100%;
            border: none;
            min-height: 900px; /* Большая высота, чтобы всё влезло */
        }
    </style>
</head>
<body>

    <div class="header-area">
        <a href="index.html">
            <img src="assets/logo.png" alt="Internationals Pro">
        </a>
    </div>

    <div class="wrapper notranslate">
        <div class="action-bar">
            <a href="index.html" class="back-link">←</a>
        </div>

        <div class="widget-container">
            <iframe id="intuiIframe" 
                src="https://www.intui.travel/?p_site=28722858&constructor=1&color_scheme=blue&b=011010110011111111&currency=RUB" 
                scrolling="no">
            </iframe>
        </div>
    </div>

    <script type="text/javascript" src="https://www.intui.travel/public/js/jquery/iframeResizer.js"></script>
    <script type="text/javascript">
        window.onload = function() {
            if (window.iFrameResize) {
                iFrameResize({ 
                    log: false, 
                    checkOrigin: false,
                    heightCalculationMethod: 'lowestElement' 
                }, '#intuiIframe');
            }
        };
    </script>
</body>
</html>
