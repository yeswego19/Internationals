<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Service | Internationals Pro</title>
    <style>
        :root {
            --primary-color: #003580;
            --hover-color: #ff0000; /* Цвет стрелки при наведении */
        }
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f7f9; }
        
        /* Шапка с твоим логотипом */
        .header {
            background-color: white;
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
        }
        .header img {
            height: 50px; /* Отрегулируй высоту под свой логотип */
            margin-right: 15px;
        }
        
        .wrapper { 
            width: 100%; 
            max-width: 1100px; 
            margin: 20px auto; 
            padding: 0 15px; 
            box-sizing: border-box; 
        }
        
        /* Стрелочка */
        .back-link {
            display: inline-block;
            margin-bottom: 15px;
            color: white; /* Белая стрелочка по умолчанию */
            text-decoration: none;
            font-size: 24px; /* Размер стрелочки */
            font-weight: bold;
            transition: color 0.3s; /* Плавный переход цвета */
        }

        .back-link:hover {
            color: var(--hover-color); /* Красная стрелочка при наведении */
        }

        .widget-container {
            background: white;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html">
            <img src="assets/logo.png" alt="Internationals Pro">
        </a>
    </div>

    <div class="wrapper notranslate">
        <a href="index.html" class="back-link">←</a>

        <div class="widget-container">
            <iframe id="intuiIframe" 
                src="https://www.intui.travel/?p_site=28722858&constructor=1&color_scheme=blue&b=011010110011111111" 
                frameborder="0" 
                scrolling="no" 
                width="100%" 
                style="border:none; min-height: 320px;">
            </iframe>
        </div>
    </div>

    <script type="text/javascript" src="https://www.intui.travel/public/js/jquery/iframeResizer.js"></script>
    <script type="text/javascript">
        window.onload = function() {
            if (window.iFrameResize) {
                iFrameResize({ log: false, checkOrigin: false }, '#intuiIframe');
            }
        };
    </script>
</body>
</html>
