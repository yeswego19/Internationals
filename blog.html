<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global News & Insights | Internationals.pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        .close-btn { position: fixed; top: 15px; right: 20px; background: transparent; border: none; color: #d9534f; font-size: 52px; cursor: pointer; z-index: 9999; padding: 0 8px; line-height: 1; }
        .close-btn:hover { color: #ff0000; transform: scale(1.1); }
        .globe { position: fixed; top: 80px; right: 20px; width: 68px; height: 68px; cursor: pointer; z-index: 9999; border: none; background: transparent; padding: 0; animation: spin 10s linear infinite; }
        .globe img { width: 100%; height: 100%; object-fit: contain; }
        .globe:hover { transform: scale(1.1); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        article { margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 30px; }
        h3 a { color: #0066cc; text-decoration: none; font-size: 1.4em; }
        h3 a:hover { text-decoration: underline; }
        .date { color: #666; font-size: 0.85em; display: block; margin-top: 10px; }
        .news-img { width: 100%; max-height: 350px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
        #status { text-align: center; padding: 10px; color: #888; font-size: 13px; }
    </style>
</head>
<body>
    <button class="close-btn" onclick="window.close()">←</button>
    <a class="globe" id="globeLink" href="#" target="_blank">
        <img src="assets/globe.png" alt="Translate">
    </a>
    <h1>Global News for Expats & Nomads</h1>
    <div id="status">Loading...</div>
    <hr>
    <div id="news-container"></div>

    <script>
        const SUPABASE_URL = "https://mcgcijdnzduzyqbbjtkm.supabase.co";
        const SUPABASE_KEY = "sb_publishable_CCc78qZY25XBUDqdYsX9_w_YyKTihee";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('globeLink').addEventListener('click', function(e) {
            e.preventDefault();
            var lang = (navigator.language || 'en').split('-')[0];
            if (lang === 'en') { alert('Your browser language is English.'); return; }
            window.open('https://translate.google.com/translate?sl=en&tl=' + lang + '&u=' + encodeURIComponent(location.href), '_blank');
        });

        function render(articles, source) {
            document.getElementById('status').textContent = articles.length + ' articles · ' + source;
            var container = document.getElementById('news-container');
            if (!articles.length) { container.innerHTML = '<p>No news at the moment.</p>'; return; }
            container.innerHTML = articles.map(function(art) {
                var slug = art.slug || art.seo_slug || '';
                var link = slug ? 'article.html?slug=' + slug : (art.link || art.url || art.source_url || '#');
                var img = art.image_url || art.thumbnail || art.enclosure || '';
                var title = art.title || '';
                var summary = (art.summary || art.description || art.contentSnippet || '').replace(/<[^>]*>/g, '').slice(0, 400);
                var date = art.created_at || art.pubDate || art.published || '';
                var src = art.source_name || art.feed_title || '';
                return '<article>' +
                    (img ? '<a href="' + link + '" target="_blank"><img src="' + img + '" class="news-img" onerror="this.style.display=\'none\'"></a>' : '') +
                    '<h3><a href="' + link + '" target="_blank">' + title + '</a></h3>' +
                    '<p>' + summary + '</p>' +
                    '<span class="date">' + (date ? new Date(date).toLocaleDateString('en-US', {day:'numeric',month:'short',year:'numeric'}) : '') + (src ? ' · ' + src : '') + '</span>' +
                    '</article>';
            }).join('');
        }

        async function loadFromRSS() {
            // Используем corsproxy.io как CORS прокси для прямого чтения RSS
            var feeds = [
                { url: 'https://feeds.bbci.co.uk/news/world/rss.xml', name: 'BBC World' },
                { url: 'https://techcrunch.com/feed/', name: 'TechCrunch' },
                { url: 'https://slator.com/feed/', name: 'Slator' }
            ];
            var all = [];
            for (var i = 0; i < feeds.length; i++) {
                try {
                    var proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(feeds[i].url);
                    var r = await fetch(proxyUrl);
                    if (!r.ok) continue;
                    var text = await r.text();
                    var parser = new DOMParser();
                    var xml = parser.parseFromString(text, 'text/xml');
                    var items = xml.querySelectorAll('item');
                    var feedName = feeds[i].name;
                    items.forEach(function(item, idx) {
                        if (idx >= 7) return;
                        var title = item.querySelector('title') ? item.querySelector('title').textContent : '';
                        var link = item.querySelector('link') ? item.querySelector('link').textContent : '';
                        var desc = item.querySelector('description') ? item.querySelector('description').textContent : '';
                        var pubDate = item.querySelector('pubDate') ? item.querySelector('pubDate').textContent : '';
                        var img = '';
                        var mediaContent = item.querySelector('content');
                        if (mediaContent) img = mediaContent.getAttribute('url') || '';
                        if (!img) {
                            var enclosure = item.querySelector('enclosure');
                            if (enclosure) img = enclosure.getAttribute('url') || '';
                        }
                        if (!img) {
                            var imgMatch = desc.match(/<img[^>]+src=["']([^"']+)["']/i);
                            if (imgMatch) img = imgMatch[1];
                        }
                        all.push({ title: title, link: link, summary: desc.replace(/<[^>]*>/g,'').slice(0,400), image_url: img, pubDate: pubDate, source_name: feedName });
                    });
                } catch(e) { console.warn('RSS error:', feeds[i].name, e.message); }
            }
            all.sort(function(a,b){ return new Date(b.pubDate) - new Date(a.pubDate); });
            return all.slice(0, 20);
        }

        async function loadNews() {
            var status = document.getElementById('status');

            // Шаг 1: Supabase (с VPN — работает, без VPN — таймаут 4 сек)
            try {
                status.textContent = 'Loading...';
                var result = await Promise.race([
                    _supabase.from('articles').select('title,summary,slug,created_at,image_url,source_url,source_name').order('created_at', {ascending: false}),
                    new Promise(function(_, reject) { setTimeout(function(){ reject(new Error('timeout')); }, 4000); })
                ]);
                if (!result.error && result.data && result.data.length > 0) {
                    render(result.data, 'Latest articles');
                    return;
                }
            } catch(e) {}

            // Шаг 2: RSS напрямую через corsproxy.io (без VPN)
            try {
                status.textContent = 'Loading news...';
                var rssData = await loadFromRSS();
                if (rssData.length > 0) {
                    render(rssData, 'Live news');
                    return;
                }
            } catch(e) {}

            status.textContent = '';
            document.getElementById('news-container').innerHTML = '<p>No news available. Please try again later.</p>';
        }

        loadNews();
    </script>
</body>
</html>
