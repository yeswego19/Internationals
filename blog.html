<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global News & Insights | Internationals.pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        article { margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        h3 a { color: #0066cc; text-decoration: none; }
        h3 a:hover { text-decoration: underline; }
        .date { color: #666; font-size: 0.85em; }
    </style>
</head>
<body>
    <h1>Global News for Expats & Nomads</h1>
    <hr>
    <div id="news-container">Loading latest insights...</div>

    <script>
        // Конфигурация подключения к твоей базе
        const SUPABASE_URL = "https://mcgcijdnzduzyqbbjtkm.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_CCc78qZY25XBUDqdYsX9_w_YyKTihee";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadNews() {
            // Запрашиваем данные из таблицы articles
            const { data: articles, error } = await _supabase
                .from('articles')
                .select('title, summary, slug, created_at')
                .order('created_at', { ascending: false });

            const container = document.getElementById('news-container');
            if (error) {
                container.innerHTML = "<p>Error loading news feed.</p>";
                console.error(error);
                return;
            }

            if (!articles || articles.length === 0) {
                container.innerHTML = "<p>No news articles available at the moment.</p>";
                return;
            }

            // Рендерим новости на страницу
            container.innerHTML = articles.map(art => `
                <article>
                    <h3><a href="article.html?slug=${art.slug}">${art.title}</a></h3>
                    <p>${art.summary}</p>
                    <span class="date">${new Date(art.created_at).toLocaleDateString('en-US', {day: 'numeric', month: 'short', year: 'numeric'})}</span>
                </article>
            `).join('');
        }

        // Запускаем функцию при загрузке страницы
        loadNews();
    </script>
</body>
</html>
