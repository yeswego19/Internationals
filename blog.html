<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global News for Expats & Nomads | Internationals.pro</title>
    <meta name="description" content="Fresh news for expats, digital nomads and travelers. Professional translation services worldwide — Internationals.pro">
    <link rel="canonical" href="https://internationals.pro/blog.html">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.7; max-width: 800px; margin: 0 auto; padding: 20px; color: #222; }
        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; margin-bottom: 28px; }
        .top-nav a { color: #0066cc; text-decoration: none; font-size: 15px; font-weight: 500; }
        .top-nav a:hover { text-decoration: underline; }
        .close-btn { background: transparent; border: none; color: #d9534f; font-size: 42px; cursor: pointer; padding: 0; line-height: 1; }
        h1 { font-size: 1.7em; margin-bottom: 4px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 28px; }
        article { margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 32px; }
        .news-img-wrap { width: 100%; aspect-ratio: 16/9; overflow: hidden; border-radius: 8px; margin-bottom: 14px; cursor: pointer; background: #f0f0f0; }
        .news-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        h2 { font-size: 1.25em; margin: 0 0 10px 0; line-height: 1.35; }
        h2 a { color: #111; text-decoration: none; cursor: pointer; }
        h2 a:hover { color: #0066cc; }
        .preview { color: #444; margin: 0 0 10px 0; font-size: 1em; }
        .full-text { display: none; color: #333; font-size: 1em; margin: 12px 0; border-left: 3px solid #0066cc; padding-left: 16px; }
        .full-text.open { display: block; }
        .read-more { background: none; border: none; color: #0066cc; cursor: pointer; font-size: 14px; padding: 0; margin-bottom: 10px; }
        .read-more:hover { text-decoration: underline; }
        .meta { color: #999; font-size: 13px; }
        .footer-cta { margin-top: 40px; padding: 20px 24px; background: #f0f7ff; border-radius: 10px; border-left: 4px solid #0066cc; font-size: 15px; }
        .footer-cta a { color: #0066cc; font-weight: 600; text-decoration: none; }
        .footer-cta a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="index.html">← Internationals.pro</a>
        <button class="close-btn" onclick="window.close()" title="Close">×</button>
    </nav>

    <h1 id="page-h1">Global News for Expats & Nomads</h1>
    <p class="subtitle" id="updated"></p>

    <div id="news-container">Loading...</div>

    <div class="footer-cta" id="footer-cta">
        <span id="cta-text">Need document translation, visa support or website localization?</span>
        <br><a href="index.html" id="cta-link">Contact Internationals.pro →</a>
    </div>

    <script>
        var lang = (navigator.language || 'en').split('-')[0];
        var ru = (lang === 'ru');

        if (ru) {
            document.getElementById('page-h1').textContent = 'Мировые новости для экспатов и путешественников';
            document.getElementById('cta-text').textContent = 'Нужен перевод документов, виза или сопровождение за рубежом?';
            document.getElementById('cta-link').textContent = 'Связаться с Internationals.pro →';
        }

        function toggleFull(btn, id) {
            var el = document.getElementById(id);
            if (el.classList.contains('open')) {
                el.classList.remove('open');
                btn.textContent = ru ? 'Читать полностью ↓' : 'Read more ↓';
            } else {
                el.classList.add('open');
                btn.textContent = ru ? 'Свернуть ↑' : 'Collapse ↑';
            }
        }

        fetch('news.json?v=' + Date.now())
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var updated = data.updated ? new Date(data.updated).toLocaleDateString(ru ? 'ru-RU' : 'en-US', {day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
                document.getElementById('updated').textContent = (ru ? 'Обновлено: ' : 'Updated: ') + updated;

                var articles = data.articles || [];
                if (!articles.length) {
                    document.getElementById('news-container').innerHTML = '<p>' + (ru ? 'Новости загружаются...' : 'No news at the moment.') + '</p>';
                    return;
                }

                document.getElementById('news-container').innerHTML = articles.map(function(art, i) {
                    var title = ru ? (art.title_ru || art.title_en || '') : (art.title_en || art.title_ru || '');
                    var preview = ru ? (art.preview_ru || art.preview_en || '') : (art.preview_en || art.preview_ru || '');
                    var full = ru ? (art.full_ru || art.full_en || '') : (art.full_en || art.full_ru || '');
                    var date = new Date().toLocaleDateString(ru ? 'ru-RU' : 'en-US', {day:'numeric',month:'short',year:'numeric'});
                    var readMore = ru ? 'Читать полностью ↓' : 'Read more ↓';
                    var fid = 'full-' + i;

                    return '<article>' +
                        (art.image_url ? '<div class="news-img-wrap" onclick="toggleFull(document.getElementById(\'btn-' + i + '\'), \'' + fid + '\')"><img src="' + art.image_url + '" class="news-img" onerror="this.parentElement.style.display=\'none\'"></div>' : '') +
                        '<h2><a onclick="toggleFull(document.getElementById(\'btn-' + i + '\'), \'' + fid + '\')">' + title + '</a></h2>' +
                        '<p class="preview">' + preview + '</p>' +
                        (full ? '<button class="read-more" id="btn-' + i + '" onclick="toggleFull(this, \'' + fid + '\')">' + readMore + '</button>' +
                        '<div class="full-text" id="' + fid + '">' + full + '</div>' : '') +
                        '<div class="meta">' + date + (art.source_name ? ' · ' + art.source_name : '') + '</div>' +
                        '</article>';
                }).join('');
            })
            .catch(function() {
                document.getElementById('news-container').innerHTML = '<p>No news available at the moment.</p>';
            });
    </script>
</body>
</html>
