<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global News & Insights | Internationals.pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }

        .close-btn {
            position: fixed;
            top: 15px;
            right: 20px;
            background: transparent;
            border: none;
            color: #d9534f;
            font-size: 52px;
            cursor: pointer;
            z-index: 9999;
            transition: all 0.2s ease;
            padding: 0 8px;
            line-height: 1;
        }

        .close-btn:hover {
            color: #ff0000;
            transform: scale(1.1);
        }

        .globe {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 68px;
            height: 68px;
            cursor: pointer;
            z-index: 9999;
            transition: all 0.3s ease;
            border: none;
            background: transparent;
            padding: 0;
            animation: spin 10s linear infinite;
        }

        .globe img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .globe:hover {
            transform: scale(1.1);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        article {
            margin-bottom: 40px;
            border-bottom: 1px solid #eee;
            padding-bottom: 30px;
        }

        h3 a {
            color: #0066cc;
            text-decoration: none;
            font-size: 1.4em;
        }

        h3 a:hover {
            text-decoration: underline;
        }

        .date {
            color: #666;
            font-size: 0.85em;
            display: block;
            margin-top: 10px;
        }

        .news-img {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
            background-color: #f0f0f0;
        }

        .goog-te-banner-frame {
            display: none !important;
        }

        body {
            top: 0 !important;
        }

        .skiptranslate iframe {
            display: none !important;
        }

        .skiptranslate {
            display: none !important;
        }
    </style>
</head>
<body>

    <button class="close-btn" onclick="closeTab()">←</button>

    <button class="globe" id="globeBtn" title="Translate to your language">
        <img src="assets/globe.png" alt="Translate">
    </button>

    <h1>Global News for Expats & Nomads</h1>
    <hr>

    <div id="news-container">Loading latest insights...</div>

    <script>
        function closeTab() {
            window.close();
        }

        let isTranslated = false;
        let targetLang = null;

        // ===== ГЛОБУС - ПЕРЕВОД НА ЯЗЫК БРАУЗЕРА =====
        const globeBtn = document.getElementById('globeBtn');

        globeBtn.addEventListener('click', function() {
            translatePage();
        });

        function translatePage() {
            const userLang = navigator.language || navigator.userLanguage;
            const langCode = userLang.split('-')[0];

            if (langCode === 'en') {
                showToast('🌐 Your browser language is English. No translation needed.');
                return;
            }

            targetLang = langCode;
            localStorage.setItem('translateLang', langCode);

            showToast('🔄 Translating to ' + getLangName(langCode) + '...');

            // Если уже переведено — просто меняем язык
            if (isTranslated && typeof google !== 'undefined' && google.translate) {
                const select = document.querySelector('.goog-te-combo');
                if (select) {
                    select.value = langCode;
                    select.dispatchEvent(new Event('change'));
                    showToast('✅ Translated to ' + getLangName(langCode));
                    return;
                }
            }

            // Загружаем Google Translate
            if (typeof google === 'undefined' || !google.translate) {
                const script = document.createElement('script');
                script.src = 'https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
                script.async = true;
                document.head.appendChild(script);

                window.googleTranslateElementInit = function() {
                    new google.translate.TranslateElement({
                        pageLanguage: 'en',
                        includedLanguages: 'en,ru,de,es,pt,zh,ar,fr,it,ja,ko,tr,uk,pl,nl',
                        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                        autoDisplay: false
                    }, 'google_translate_element');

                    // Ждём загрузки и переводим
                    setTimeout(function() {
                        doTranslate(langCode);
                    }, 1500);
                };

                if (!document.getElementById('google_translate_element')) {
                    const container = document.createElement('div');
                    container.id = 'google_translate_element';
                    container.style.display = 'none';
                    document.body.appendChild(container);
                }
            } else {
                // Google Translate уже загружен
                doTranslate(langCode);
            }
        }

        function doTranslate(langCode) {
            const select = document.querySelector('.goog-te-combo');
            if (select) {
                select.value = langCode;
                select.dispatchEvent(new Event('change'));
                isTranslated = true;
                showToast('✅ Translated to ' + getLangName(langCode));
            } else {
                // Если select не найден, пробуем ещё раз через секунду
                setTimeout(function() {
                    doTranslate(langCode);
                }, 1000);
            }
        }

        function getLangName(lang) {
            const names = {
                'en': 'English', 'ru': 'Русский', 'de': 'Deutsch',
                'es': 'Español', 'pt': 'Português', 'zh': '中文',
                'ar': 'العربية', 'fr': 'Français', 'it': 'Italiano',
                'ja': '日本語', 'ko': '한국어', 'tr': 'Türkçe',
                'uk': 'Українська', 'pl': 'Polski', 'nl': 'Nederlands'
            };
            return names[lang] || lang.toUpperCase();
        }

        function showToast(msg) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.style.cssText = `
                    position: fixed;
                    bottom: 30px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: #1e293b;
                    color: #fff;
                    padding: 12px 24px;
                    border-radius: 12px;
                    font-size: 14px;
                    z-index: 99999;
                    opacity: 0;
                    transition: opacity 0.3s ease;
                    pointer-events: none;
                    text-align: center;
                    max-width: 90%;
                    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
                `;
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            toast.style.opacity = '1';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.style.opacity = '0';
            }, 3000);
        }

        // ===== АВТОПЕРЕВОД ПОСЛЕ ЗАГРУЗКИ НОВОСТЕЙ =====
        function autoTranslateAfterLoad() {
            const savedLang = localStorage.getItem('translateLang');
            if (savedLang && savedLang !== 'en') {
                targetLang = savedLang;
                // Ждём, пока Google Translate загрузится и переводим
                setTimeout(function() {
                    translatePage();
                }, 1000);
            }
        }

        // ===== SUPABASE =====
        const SUPABASE_URL = "https://mcgcijdnzduzyqbbjtkm.supabase.co";
        const SUPABASE_KEY = "sb_publishable_CCc78qZY25XBUDqdYsX9_w_YyKTihee";

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadNews() {
            const { data: articles, error } = await _supabase
                .from('articles')
                .select('title, summary, slug, created_at, image_url')
                .order('created_at', { ascending: false });

            const container = document.getElementById('news-container');

            if (error) {
                container.innerHTML = `<p>Error loading news feed.</p>`;
                console.error(error);
                return;
            }

            if (!articles || articles.length === 0) {
                container.innerHTML = `<p>No news articles available at the moment.</p>`;
                return;
            }

            container.innerHTML = articles.map(art => `
                <article>
                    ${art.image_url ? 
                        `<a href="article.html?slug=${art.slug}" target="_blank">
                            <img src="${art.image_url}" class="news-img" alt="${art.title}">
                        </a>` : ''
                    }
                    <h3>
                        <a href="article.html?slug=${art.slug}" target="_blank">
                            ${art.title}
                        </a>
                    </h3>
                    <p>${art.summary}</p>
                    <span class="date">
                        ${new Date(art.created_at).toLocaleDateString('en-US', {
                            day: 'numeric',
                            month: 'short',
                            year: 'numeric'
                        })}
                    </span>
                </article>
            `).join('');

            // ===== ПОСЛЕ ЗАГРУЗКИ НОВОСТЕЙ - ПЕРЕВОДИМ =====
            autoTranslateAfterLoad();
        }

        loadNews();
    </script>
</body>
</html>
