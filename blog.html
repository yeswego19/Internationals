<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global News & Insights | Internationals.pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }

        /* ===== КНОПКИ В ПРАВОМ ВЕРХНЕМ УГЛУ ===== */
        .top-buttons {
            position: fixed;
            top: 15px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 9999;
        }

        /* ===== КРАСНАЯ СТРЕЛКА ===== */
        .close-btn {
            background: transparent;
            border: none;
            color: #d9534f;
            font-size: 52px;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 0 8px;
            line-height: 1;
        }

        .close-btn:hover {
            color: #ff0000;
            transform: scale(1.1);
        }

        /* ===== ГЛОБУС (КАРТИНКА ИЗ ASSETS) ===== */
        .globe-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            border: none;
            padding: 0;
            overflow: hidden;
        }

        .globe-btn img {
            width: 70%;
            height: 70%;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }

        .globe-btn:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 6px 25px rgba(59, 130, 246, 0.6);
        }

        .globe-btn:active {
            transform: scale(0.95);
        }

        /* ===== ВЫПАДАЮЩЕЕ МЕНЮ ЯЗЫКОВ ===== */
        #languageDropdown {
            position: fixed;
            top: 120px;
            right: 20px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.2);
            padding: 8px 0;
            min-width: 160px;
            z-index: 10000;
            display: none;
            border: 1px solid #e5e7eb;
        }

        #languageDropdown.show {
            display: block;
        }

        .language-option {
            padding: 10px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            transition: background 0.15s;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            color: #333;
        }

        .language-option:hover {
            background: #f3f4f6;
        }

        .language-option span {
            color: #6b7280;
            font-size: 13px;
        }

        .language-option.active {
            background: #e0e7ff;
            color: #1d4ed8;
        }

        .language-option.active span {
            color: #1d4ed8;
        }

        /* ===== СТИЛИ НОВОСТЕЙ ===== */
        article {
            margin-bottom: 40px;
            border-bottom: 1px solid #eee;
            padding-bottom: 30px;
        }

        h3 a {
            color: #0066cc;
            text-decoration: none;
            font-size: 1.4em;
        }

        h3 a:hover {
            text-decoration: underline;
        }

        .date {
            color: #666;
            font-size: 0.85em;
            display: block;
            margin-top: 10px;
        }

        .news-img {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
            background-color: #f0f0f0;
        }

        @media (max-width: 600px) {
            .top-buttons {
                top: 10px;
                right: 10px;
                gap: 5px;
            }
            .close-btn {
                font-size: 40px;
            }
            .globe-btn {
                width: 40px;
                height: 40px;
            }
            #languageDropdown {
                top: 105px;
                right: 10px;
                min-width: 140px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== КНОПКИ В ПРАВОМ ВЕРХНЕМ УГЛУ ===== -->
    <div class="top-buttons">
        <!-- КРАСНАЯ СТРЕЛКА (закрытие) -->
        <button class="close-btn" onclick="closeTab()">←</button>
        <!-- ГЛОБУС (картинка из assets) -->
        <button class="globe-btn" id="globeBtn" title="Change language">
            <img src="assets/globe.png" alt="Language">
        </button>
    </div>

    <!-- ===== ВЫПАДАЮЩЕЕ МЕНЮ ЯЗЫКОВ ===== -->
    <div id="languageDropdown">
        <button class="language-option" data-lang="en">EN <span>English</span></button>
        <button class="language-option" data-lang="ru">RU <span>Русский</span></button>
        <button class="language-option" data-lang="de">DE <span>Deutsch</span></button>
        <button class="language-option" data-lang="es">ES <span>Español</span></button>
        <button class="language-option" data-lang="pt">PT <span>Português</span></button>
        <button class="language-option" data-lang="zh">ZH <span>中文</span></button>
        <button class="language-option" data-lang="ar">AR <span>العربية</span></button>
    </div>

    <h1>Global News for Expats & Nomads</h1>
    <hr>

    <div id="news-container">Loading latest insights...</div>

    <script>
        // ===== ФУНКЦИЯ ЗАКРЫТИЯ ВКЛАДКИ =====
        function closeTab() {
            window.close();
        }

        // ===== ГЛОБУС И ЯЗЫКИ =====
        const globeBtn = document.getElementById('globeBtn');
        const dropdown = document.getElementById('languageDropdown');

        globeBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdown.classList.toggle('show');
        });

        document.addEventListener('click', function(e) {
            if (!dropdown.contains(e.target) && e.target !== globeBtn) {
                dropdown.classList.remove('show');
            }
        });

        document.querySelectorAll('.language-option').forEach(opt => {
            opt.addEventListener('click', function(e) {
                e.stopPropagation();
                const lang = this.dataset.lang;
                setLanguage(lang);
                dropdown.classList.remove('show');
            });
        });

        // ===== ПЕРЕВОДЫ ДЛЯ СТРАНИЦЫ НОВОСТЕЙ =====
        const translations = {
            en: {
                title: "Global News for Expats & Nomads",
                loading: "Loading latest insights...",
                error: "Error loading news feed.",
                no_news: "No news articles available at the moment."
            },
            ru: {
                title: "Глобальные новости для экспатов и номадов",
                loading: "Загрузка последних новостей...",
                error: "Ошибка загрузки новостей.",
                no_news: "На данный момент новостей нет."
            },
            de: {
                title: "Globale Nachrichten für Expats und Nomaden",
                loading: "Lade neueste Nachrichten...",
                error: "Fehler beim Laden der Nachrichten.",
                no_news: "Derzeit keine Nachrichten verfügbar."
            },
            es: {
                title: "Noticias globales para expatriados y nómadas",
                loading: "Cargando últimas noticias...",
                error: "Error al cargar las noticias.",
                no_news: "No hay noticias disponibles en este momento."
            },
            pt: {
                title: "Notícias globais para expatriados e nómadas",
                loading: "Carregando últimas notícias...",
                error: "Erro ao carregar notícias.",
                no_news: "Nenhuma notícia disponível no momento."
            },
            zh: {
                title: "全球新闻 | 外籍人士和游民",
                loading: "加载最新资讯...",
                error: "加载新闻失败。",
                no_news: "目前没有新闻。"
            },
            ar: {
                title: "أخبار عالمية للمغتربين والبدو",
                loading: "جاري تحميل آخر الأخبار...",
                error: "خطأ في تحميل الأخبار.",
                no_news: "لا توجد أخبار متاحة حالياً."
            }
        };

        let currentLang = localStorage.getItem('blogLang') || 'en';

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('blogLang', lang);

            const t = translations[lang];
            if (t) {
                document.querySelector('h1').textContent = t.title;
            }

            document.querySelectorAll('.language-option').forEach(opt => {
                opt.classList.toggle('active', opt.dataset.lang === lang);
            });

            document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
        }

        // ===== SUPABASE =====
        const SUPABASE_URL = "https://mcgcijdnzduzyqbbjtkm.supabase.co";
        const SUPABASE_KEY = "sb_publishable_CCc78qZY25XBUDqdYsX9_w_YyKTihee";

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadNews() {
            const { data: articles, error } = await _supabase
                .from('articles')
                .select('title, summary, slug, created_at, image_url')
                .order('created_at', { ascending: false });

            const container = document.getElementById('news-container');
            const t = translations[currentLang] || translations.en;

            if (error) {
                container.innerHTML = `<p>${t.error}</p>`;
                console.error(error);
                return;
            }

            if (!articles || articles.length === 0) {
                container.innerHTML = `<p>${t.no_news}</p>`;
                return;
            }

            container.innerHTML = articles.map(art => `
                <article>
                    ${art.image_url ? 
                        `<a href="article.html?slug=${art.slug}" target="_blank">
                            <img src="${art.image_url}" class="news-img" alt="${art.title}">
                        </a>` : ''
                    }
                    <h3>
                        <a href="article.html?slug=${art.slug}" target="_blank">
                            ${art.title}
                        </a>
                    </h3>
                    <p>${art.summary}</p>
                    <span class="date">
                        ${new Date(art.created_at).toLocaleDateString(
                            currentLang === 'ru' ? 'ru-RU' : 
                            currentLang === 'de' ? 'de-DE' :
                            currentLang === 'es' ? 'es-ES' :
                            currentLang === 'pt' ? 'pt-PT' :
                            currentLang === 'zh' ? 'zh-CN' :
                            currentLang === 'ar' ? 'ar-SA' : 'en-US', {
                            day: 'numeric',
                            month: 'short',
                            year: 'numeric'
                        })}
                    </span>
                </article>
            `).join('');
        }

        // ===== ЗАГРУЗКА =====
        const savedLang = localStorage.getItem('blogLang');
        if (savedLang && translations[savedLang]) {
            currentLang = savedLang;
        } else {
            const browserLang = navigator.language?.split('-')[0] || 'en';
            if (translations[browserLang]) {
                currentLang = browserLang;
            }
        }

        setLanguage(currentLang);
        loadNews();
    </script>
</body>
</html>
