<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global News & Insights | Internationals.pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }

        .close-btn {
            position: fixed;
            top: 15px;
            right: 20px;  /* ← СПРАВА */
            background: transparent;
            border: none;
            color: #d9534f;
            font-size: 52px;
            cursor: pointer;
            z-index: 9999;
            transition: all 0.2s ease;
            padding: 0 8px;
            line-height: 1;
        }

        .close-btn:hover {
            color: #ff0000;
            transform: scale(1.1);
        }

        article {
            margin-bottom: 40px;
            border-bottom: 1px solid #eee;
            padding-bottom: 30px;
        }

        h3 a {
            color: #0066cc;
            text-decoration: none;
            font-size: 1.4em;
        }

        h3 a:hover {
            text-decoration: underline;
        }

        .date {
            color: #666;
            font-size: 0.85em;
            display: block;
            margin-top: 10px;
        }

        .news-img {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
            background-color: #f0f0f0;
        }

        @media (max-width: 600px) {
            .close-btn {
                font-size: 40px;
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Кнопка-стрелка влево (красная) - СПРАВА -->
    <button class="close-btn" onclick="closeTab()">←</button>

    <h1>Global News for Expats & Nomads</h1>
    <hr>

    <div id="news-container">Loading latest insights...</div>

    <script>
        // Функция: просто закрыть вкладку
        function closeTab() {
            window.close();
        }

        // Конфигурация Supabase
        const SUPABASE_URL = "https://mcgcijdnzduzyqbbjtkm.supabase.co";
        const SUPABASE_KEY = "sb_publishable_CCc78qZY25XBUDqdYsX9_w_YyKTihee";

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadNews() {
            const { data: articles, error } = await _supabase
                .from('articles')
                .select('title, summary, slug, created_at, image_url')
                .order('created_at', { ascending: false });

            const container = document.getElementById('news-container');

            if (error) {
                container.innerHTML = "<p>Error loading news feed.</p>";
                console.error(error);
                return;
            }

            if (!articles || articles.length === 0) {
                container.innerHTML = "<p>No news articles available at the moment.</p>";
                return;
            }

            container.innerHTML = articles.map(art => `
                <article>
                    ${art.image_url ? 
                        `<a href="article.html?slug=${art.slug}" target="_blank">
                            <img src="${art.image_url}" class="news-img" alt="${art.title}">
                        </a>` : ''
                    }
                    <h3>
                        <a href="article.html?slug=${art.slug}" target="_blank">
                            ${art.title}
                        </a>
                    </h3>
                    <p>${art.summary}</p>
                    <span class="date">
                        ${new Date(art.created_at).toLocaleDateString('en-US', {
                            day: 'numeric',
                            month: 'short',
                            year: 'numeric'
                        })}
                    </span>
                </article>
            `).join('');
        }

        loadNews();
    </script>
</body>
</html>
