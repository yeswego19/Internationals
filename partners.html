<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnership | Internationals</title>
    <link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0d121f;
            min-height: 100vh;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 0 80px 0;
            width: 100%;
        }

        .card {
            background: #ffffff;
            padding: 30px; 
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }

        .brand-name {
            color: #3b82f6;
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: block;
        }

        .form-wrapper {
            position: relative;
            width: 100%;
        }

        .sig-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 92%;
            width: 100vw;
            height: 180px;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 15;
        }

        canvas {
            width: 800px !important;
            height: 180px !important;
        }

        /* На мобиле canvas поменьше */
        @media(max-width:768px){
            .sig-container {
                width: 100vw;
                height: 120px;
            }
            canvas {
                width: 100vw !important;
                height: 120px !important;
            }
        }

        .back-link {
            display: block;
            margin-top: 100px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .back-link:hover { color: #ff4d4d; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="card">
            <span class="brand-name">Internationals</span>
            
            <div class="form-wrapper">
                <div class="sender-form-field" data-sender-form-id="dL9p2w"></div>
                
                <div class="sig-container">
                    <canvas id="canvas-signature"></canvas>
                </div>
            </div>
        </div>
        
        <a href="#" onclick="window.close(); return false;" class="back-link">← На главную</a>
    </div>

    <script>
      (function (s, e, n, d, er) {
        s['Sender'] = er; s[er] = s[er] || function () { (s[er].q = s[er].q || []).push(arguments) }, s[er].l = 1 * new Date();
        var a = e.createElement(n), m = e.getElementsByTagName(n)[0];
        a.async = 1; a.src = d; m.parentNode.insertBefore(a, m)
      })(window, document, 'script', 'https://cdn.sender.net/accounts_resources/universal.js', 'sender');
      sender('456b04acf96531');
    </script>

    <script>
    const canvas = document.getElementById('canvas-signature');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const isMobile = window.innerWidth <= 768;

    // Размер холста зависит от устройства
    const CW = isMobile ? window.innerWidth : 800;
    const CH = isMobile ? 120 : 180;
    canvas.width = CW;
    canvas.height = CH;

    let particles = [];
    let mouse = { x: -1000, y: -1000, radius: isMobile ? 50 : 75 };

    // Шаг сетки: на мобиле крупнее — меньше частиц, меньше нагрузка
    const STEP = isMobile ? 7 : 4;
    const FONT_SIZE = isMobile ? 52 : 85;

    function init() {
        ctx.clearRect(0, 0, CW, CH);
        ctx.fillStyle = 'white';
        ctx.font = `${FONT_SIZE}px "Reenie Beanie"`;
        ctx.textAlign = 'center';
        ctx.fillText('Digital Signature', CW / 2, CH / 2 + FONT_SIZE * 0.3);

        const data = ctx.getImageData(0, 0, CW, CH);
        particles = [];

        class Particle {
            constructor(x, y) {
                this.x = Math.random() * CW;
                this.y = Math.random() * CH;
                this.destX = x; this.destY = y;
                this.vx = 0; this.vy = 0;
                this.acc = isMobile ? 0.14 : 0.18;
                this.fric = isMobile ? 0.78 : 0.75;
            }
            draw() {
                ctx.fillStyle = 'rgba(59, 130, 246, 0.7)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, isMobile ? 1.2 : 1.6, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                let dx = this.x - mouse.x;
                let dy = this.y - mouse.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < mouse.radius) {
                    this.vx += dx / 7; this.vy += dy / 7;
                }
                this.vx += (this.destX - this.x) * this.acc;
                this.vy += (this.destY - this.y) * this.acc;
                this.vx *= this.fric; this.vy *= this.fric;
                this.x += this.vx; this.y += this.vy;
            }
        }

        for (let y = 0; y < data.height; y += STEP) {
            for (let x = 0; x < data.width; x += STEP) {
                if (data.data[(y * 4 * data.width) + (x * 4) + 3] > 128) {
                    particles.push(new Particle(x, y));
                }
            }
        }
    }

    function animate() {
        ctx.clearRect(0, 0, CW, CH);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }

    // Мышь — десктоп
    window.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = (e.clientX - rect.left) * (CW / rect.width);
        mouse.y = (e.clientY - rect.top) * (CH / rect.height);
    });

    // Тач — мобил
    window.addEventListener('touchmove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        mouse.x = (touch.clientX - rect.left) * (CW / rect.width);
        mouse.y = (touch.clientY - rect.top) * (CH / rect.height);
    }, { passive: true });

    window.addEventListener('touchend', () => {
        mouse.x = -1000; mouse.y = -1000;
    });

    document.fonts.ready.then(() => {
        init(); animate();
    });
    </script>
</body>
</html>
