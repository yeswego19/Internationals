<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnership | Internationals</title>
    <link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0d121f; font-family: 'Inter', sans-serif; color: white; overflow-x: hidden; }
        .wrapper { display: flex; flex-direction: column; align-items: center; padding: 40px 0; width: 100%; }
        
        /* КАРТОЧКА С ФОРМОЙ */
        .card { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5); position: relative; z-index: 100; margin-bottom: 80px; color: #333; }
        .brand-name { color: #3b82f6; font-size: 26px; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; display: block; }

        /* ПОДПИСЬ */
        .sig-container { position: absolute; left: 50%; transform: translateX(-50%); top: 92%; width: 100vw; height: 180px; pointer-events: none; z-index: 10; }
        canvas { width: 800px !important; height: 180px !important; }

        /* БЛЮР И СТЕНА СТАТЕЙ */
        #articlesWall { width: 90%; max-width: 800px; filter: blur(35px); opacity: 0.05; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
        .unlocked { filter: blur(0) !important; opacity: 1 !important; pointer-events: auto !important; }

        .article-block { background: rgba(255,255,255,0.03); padding: 40px; margin-bottom: 40px; border-radius: 15px; border-left: 5px solid #3b82f6; }
        .article-block h2 { color: #3b82f6; font-size: 30px; margin: 0 0 20px 0; }
        .article-block p { line-height: 1.8; color: #cbd5e1; font-size: 18px; }
        .article-block img { width: 100%; border-radius: 12px; margin: 20px 0; border: 1px solid rgba(59, 130, 246, 0.5); display: block; }

        /* КНОПКА ДОСТУПА */
        .unlock-btn { display: none; width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; font-size: 16px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div id="lockCard" class="card">
            <span class="brand-name">Internationals</span>
            <div class="sender-form-field" data-sender-form-id="dL9p2w"></div>
            
            <!-- Кнопка появится, если в ссылке есть ?unlock=true -->
            <button id="unlockBtn" class="unlock-btn" onclick="unlock()">ОТКРЫТЬ ДОСТУП</button>

            <div class="sig-container">
                <canvas id="canvas-signature"></canvas>
            </div>
        </div>

        <div id="articlesWall"></div>
    </div>

    <script src="https://cdn.sender.net/accounts_resources/universal.js"></script>
    <script>
        sender('456b04acf96531');

        // ЗАГРУЗКА ТЕКСТА И ФОТО
        fetch('articles.txt').then(r => r.text()).then(data => {
            const wall = document.getElementById('articlesWall');
            data.split('\n\n\n').forEach(art => {
                let lines = art.trim().split('\n');
                if (lines.length > 0) {
                    let div = document.createElement('div');
                    div.className = 'article-block';
                    let content = `<h2>${lines[0]}</h2>`;
                    lines.slice(1).forEach(l => {
                        let text = l.trim();
                        if(text.toUpperCase().startsWith('IMG:')) {
                            content += `<img src="${text.substring(4).trim()}">`;
                        } else if(text.includes('<a href=')) {
                            content += `<div style="margin-top:15px;">${text}</div>`;
                        } else if(text !== "") {
                            content += `<p>${text}</p>`;
                        }
                    });
                    div.innerHTML = content;
                    wall.appendChild(div);
                }
            });
        });

        function unlock() {
            document.getElementById('articlesWall').classList.add('unlocked');
            document.getElementById('lockCard').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('lockCard').style.display = 'none';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 500);
        }

        if (window.location.search.includes('unlock')) {
            document.getElementById('unlockBtn').style.display = 'block';
        }

        // ПОДПИСЬ
        const canvas = document.getElementById('canvas-signature');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 180;
        let particles = [];
        function init() {
            ctx.fillStyle = 'white'; ctx.font = '85px "Reenie Beanie"'; ctx.textAlign = 'center';
            ctx.fillText('Digital Signature', 400, 100);
            let d = ctx.getImageData(0,0,800,180).data;
            particles = [];
            for(let y=0; y<180; y+=4) for(let x=0; x<800; x+=4) {
                if(d[(y*800+x)*4+3] > 128) particles.push({x:Math.random()*800, y:Math.random()*180, dx:x, dy:y, vx:0, vy:0});
            }
        }
        function draw() {
            ctx.clearRect(0,0,800,180);
            particles.forEach(p => {
                p.vx += (p.dx-p.x)*0.1; p.vy += (p.dy-p.y)*0.1; p.vx*=0.8; p.vy*=0.8; p.x+=p.vx; p.y+=p.vy;
                ctx.fillStyle = '#3b82f6'; ctx.beginPath(); ctx.arc(p.x,p.y,1.5,0,7); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        document.fonts.ready.then(() => { init(); draw(); });
    </script>
</body>
</html>
