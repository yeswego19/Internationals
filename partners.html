<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnership | Internationals</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d121f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
            overflow-x: hidden; /* Чтобы частицы не создавали прокрутку */
        }

        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }

        h1 { 
            color: #3b82f6; 
            font-size: 32px; 
            margin-top: 0; 
            margin-bottom: 25px; 
            font-weight: bold;
        }

        .form-wrapper {
            position: relative;
            width: 100%;
            min-height: 150px;
        }

        /* Прячем логотип Sender */
        .sender-form-container a { display: none !important; }

        /* СТИЛИ ХОЛСТОВ (ПК) */
        .sig-canvas {
            position: absolute;
            top: 80%; /* Уровень оранжевой кнопки */
            transform: translateY(-50%);
            pointer-events: none;
            z-index: -1; /* Чтобы не мешало кликать по форме */
        }

        #canvas-digital {
            right: 100%; /* Слева от карточки */
            margin-right: 10px;
        }

        #canvas-signature {
            left: 100%; /* Справа от карточки */
            margin-left: 10px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }

        /* СКРЫВАЕМ НА МОБИЛКАХ */
        @media (max-width: 768px) {
            .sig-canvas { display: none !important; }
            .card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div class="card">
            <h1>Internationals</h1>
            
            <div class="form-wrapper">
                <div class="sender-form-field" data-sender-form-id="dL9p2w"></div>

                <canvas id="canvas-digital" class="sig-canvas" width="180" height="100"></canvas>
                <canvas id="canvas-signature" class="sig-canvas" width="200" height="100"></canvas>
            </div>
        </div>
        
        <a href="index.html" class="back-link">← На главную</a>
    </div>

    <script>
      (function (s, e, n, d, er) {
        s['Sender'] = er; s[er] = s[er] || function () { (s[er].q = s[er].q || []).push(arguments) }, s[er].l = 1 * new Date();
        var a = e.createElement(n), m = e.getElementsByTagName(n)[0];
        a.async = 1; a.src = d; m.parentNode.insertBefore(a, m)
      })(window, document, 'script', 'https://cdn.sender.net/accounts_resources/universal.js', 'sender');
      sender('456b04acf96531');
    </script>

    <script>
    if (window.innerWidth > 768) {
        const initParticles = (canvasId, text) => {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            let particles = [];
            let mouse = { x: -1000, y: -1000, radius: 70 };

            // Сканируем текст
            ctx.fillStyle = 'white';
            ctx.font = '40px "Reenie Beanie"';
            ctx.fillText(text, 10, 60);
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height);

            class Particle {
                constructor(x, y) {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.destX = x;
                    this.destY = y;
                    this.vx = 0;
                    this.vy = 0;
                    this.acc = 0.08;
                    this.fric = 0.85;
                }
                draw() {
                    ctx.fillStyle = 'rgba(59, 130, 246, 0.6)';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 1.3, 0, Math.PI * 2);
                    ctx.fill();
                }
                update() {
                    let dx = this.x - mouse.x;
                    let dy = this.y - mouse.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < mouse.radius) {
                        this.vx += dx / 15;
                        this.vy += dy / 15;
                    }
                    this.vx += (this.destX - this.x) * this.acc;
                    this.vy += (this.destY - this.y) * this.acc;
                    this.vx *= this.fric;
                    this.vy *= this.fric;
                    this.x += this.vx;
                    this.y += this.vy;
                }
            }

            for (let y = 0; y < data.height; y += 3) {
                for (let x = 0; x < data.width; x += 3) {
                    if (data.data[(y * 4 * data.width) + (x * 4) + 3] > 128) {
                        particles.push(new Particle(x, y));
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();

            window.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
            });
        };

        // Ждем загрузки шрифта перед запуском
        document.fonts.ready.then(() => {
            initParticles('canvas-digital', 'Digital');
            initParticles('canvas-signature', 'Signature');
        });
    }
    </script>
</body>
</html>
