<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnership | Internationals</title>
    <link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0d121f;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: sans-serif;
            overflow: hidden;
        }

        .card {
            background: #ffffff;
            padding: 40px; 
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
            overflow: visible !important;
        }

        /* Только синяя надпись, без иконок и лишнего текста */
        .brand-name {
            color: #3b82f6;
            font-size: 32px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 25px;
            display: block;
        }

        .form-wrapper {
            position: relative;
            width: 100%;
            z-index: 5;
        }

        /* ПОДПИСЬ - поднял максимально (top: 85%) */
        .sig-container {
            position: absolute;
            top: 85%; 
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            z-index: -1;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 60px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #ff4d4d !important;
        }
    </style>
</head>
<body>

    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div class="card">
            <span class="brand-name">Internationals</span>
            
            <div class="form-wrapper">
                <div class="sender-form-field" data-sender-form-id="dL9p2w"></div>

                <div class="sig-container">
                    <canvas id="canvas-signature" width="800" height="200"></canvas>
                </div>
            </div>
        </div>
        
        <a href="index.html" class="back-link">← На главную</a>
    </div>

    <script>
      (function (s, e, n, d, er) {
        s['Sender'] = er; s[er] = s[er] || function () { (s[er].q = s[er].q || []).push(arguments) }, s[er].l = 1 * new Date();
        var a = e.createElement(n), m = e.getElementsByTagName(n)[0];
        a.async = 1; a.src = d; m.parentNode.insertBefore(a, m)
      })(window, document, 'script', 'https://cdn.sender.net/accounts_resources/universal.js', 'sender');

    <script>
    if (window.innerWidth > 768) {
        const canvas = document.getElementById('canvas-signature');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let particles = [];
        let mouse = { x: -1000, y: -1000, radius: 80 };

        function init() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.font = '90px "Reenie Beanie"';
            ctx.textAlign = 'center';
            // Сместил отрисовку чуть выше центра холста
            ctx.fillText('Digital Signature', canvas.width / 2, canvas.height / 2);
            
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
            particles = [];

            class Particle {
                constructor(x, y) {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.destX = x; this.destY = y;
                    this.vx = 0; this.vy = 0;
                    this.acc = 0.15; this.fric = 0.75;
                }
                draw() {
                    ctx.fillStyle = 'rgba(59, 130, 246, 0.6)';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                update() {
                    let dx = this.x - mouse.x;
                    let dy = this.y - mouse.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < mouse.radius) {
                        this.vx += dx / 7; this.vy += dy / 7;
                    }
                    this.vx += (this.destX - this.x) * this.acc;
                    this.vy += (this.destY - this.y) * this.acc;
                    this.vx *= this.fric; this.vy *= this.fric;
                    this.x += this.vx; this.y += this.vy;
                }
            }

            for (let y = 0; y < data.height; y += 4) {
                for (let x = 0; x < data.width; x += 4) {
                    if (data.data[(y * 4 * data.width) + (x * 4) + 3] > 128) {
                        particles.push(new Particle(x, y));
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
            mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
        });

        document.fonts.ready.then(() => {
            init();
            animate();
        });
    }
    </script>
</body>
</html>
