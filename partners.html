<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnership | Internationals</title>
    <link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0d121f;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: sans-serif;
            overflow-x: hidden;
        }

        .card {
            background: #ffffff;
            padding: 30px 40px 100px 40px; /* Увеличил нижний отступ для подписи */
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
            overflow: visible !important;
        }

        /* Заголовок вместо битой картинки */
        .top-logo {
            color: #3b82f6;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }
        .sub-logo {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 25px;
            display: block;
        }

        .form-wrapper {
            position: relative;
            width: 100%;
            z-index: 5;
        }

        /* КОНТЕЙНЕР ДЛЯ ХОЛСТОВ (Центровка) */
        .sig-container {
            position: absolute;
            top: 110%; /* Опустил ниже кнопки Submit */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 60px; /* Тот самый пробел между словами */
            pointer-events: none;
            z-index: -1;
        }

        .sig-canvas {
            background: transparent;
        }

        /* ССЫЛКА НА ГЛАВНУЮ С КРАСНЫМ ХОВЕРОМ */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 40px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 20;
        }

        .back-link:hover {
            color: #ff4d4d !important;
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.4);
        }
    </style>
</head>
<body>

    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div class="card">
            <span class="top-logo">Internationals</span>
            <span class="sub-logo">Partnership Program</span>
            
            <img src="https://internationals.pro/partners_files/logo.png" style="width: 60px; margin-bottom: 20px;" alt="I">
            
            <div class="form-wrapper">
                <div class="sender-form-field" data-sender-form-id="dL9p2w"></div>

                <div class="sig-container">
                    <canvas id="canvas-digital" class="sig-canvas" width="300" height="150"></canvas>
                    <canvas id="canvas-signature" class="sig-canvas" width="350" height="150"></canvas>
                </div>
            </div>
        </div>
        
        <a href="index.html" class="back-link">← На главную</a>
    </div>

    <script>
      (function (s, e, n, d, er) {
        s['Sender'] = er; s[er] = s[er] || function () { (s[er].q = s[er].q || []).push(arguments) }, s[er].l = 1 * new Date();
        var a = e.createElement(n), m = e.getElementsByTagName(n)[0];
        a.async = 1; a.src = d; m.parentNode.insertBefore(a, m)
      })(window, document, 'script', 'https://cdn.sender.net/accounts_resources/universal.js', 'sender');
      sender('456b04acf96531');
    </script>

    <script>
    if (window.innerWidth > 768) {
        const initParticles = (canvasId, text, align) => {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            let particles = [];
            let mouse = { x: -1000, y: -1000, radius: 80 };

            const fontSize = 85; 
            ctx.fillStyle = 'white';
            ctx.font = `${fontSize}px "Reenie Beanie"`;
            ctx.textAlign = align;
            
            const xPos = align === 'right' ? canvas.width : 0;
            ctx.fillText(text, xPos, canvas.height / 2);
            
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height);

            class Particle {
                constructor(x, y) {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.destX = x; this.destY = y;
                    this.vx = 0; this.vy = 0;
                    this.acc = 0.12; this.fric = 0.85;
                }
                draw() {
                    ctx.fillStyle = 'rgba(59, 130, 246, 0.65)';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 1.6, 0, Math.PI * 2);
                    ctx.fill();
                }
                update() {
                    let dx = this.x - mouse.x;
                    let dy = this.y - mouse.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < mouse.radius) {
                        this.vx += dx / 10; this.vy += dy / 10;
                    }
                    this.vx += (this.destX - this.x) * this.acc;
                    this.vy += (this.destY - this.y) * this.acc;
                    this.vx *= this.fric; this.vy *= this.fric;
                    this.x += this.vx; this.y += this.vy;
                }
            }

            for (let y = 0; y < data.height; y += 4) {
                for (let x = 0; x < data.width; x += 4) {
                    if (data.data[(y * 4 * data.width) + (x * 4) + 3] > 128) {
                        particles.push(new Particle(x, y));
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();

            window.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
            });
        };

        document.fonts.ready.then(() => {
            initParticles('canvas-digital', 'Digital', 'right');
            initParticles('canvas-signature', 'Signature', 'left');
        });
    }
    </script>
</body>
</html>
