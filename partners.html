<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnership | Internationals</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0; background-color: #0d121f;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: sans-serif;
        }

        .card {
            background: #ffffff; padding: 40px; border-radius: 20px;
            width: 100%; max-width: 400px; text-align: center;
            position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            overflow: visible; /* Чтобы буквам было куда лететь за пределы */
        }

        h1 { color: #3b82f6; font-size: 32px; margin-bottom: 20px; }

        /* КОНТЕЙНЕР ПОДПИСИ ПОД КНОПКОЙ */
        .signature-wrapper {
            margin-top: -25px; /* Залезает под оранжевую кнопку */
            cursor: pointer;
            display: inline-block;
            position: relative;
            z-index: 10;
        }

        /* СТИЛЬ БУКВ ПОДПИСИ */
        .digital-signature {
            font-family: 'Reenie Beanie', cursive;
            font-size: 45px;
            color: rgba(59, 130, 246, 0.5);
            display: flex;
            justify-content: center;
            gap: 2px;
            transform: rotate(-3deg);
            user-select: none;
        }

        .digital-signature span {
            display: inline-block;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ЭФФЕКТ РАЗЛЕТА ПРИ НАВЕДЕНИИ */
        .signature-wrapper:hover span:nth-child(1) { transform: translate(-20px, -30px) rotate(-40deg); opacity: 0.7; }
        .signature-wrapper:hover span:nth-child(2) { transform: translate(15px, -40px) rotate(30deg); opacity: 0.7; }
        .signature-wrapper:hover span:nth-child(3) { transform: translate(-10px, 35px) rotate(-20deg); opacity: 0.7; }
        .signature-wrapper:hover span:nth-child(4) { transform: translate(25px, 20px) rotate(50deg); opacity: 0.7; }
        .signature-wrapper:hover span:nth-child(5) { transform: translate(-30px, 10px) rotate(-60deg); opacity: 0.7; }
        .signature-wrapper:hover span:nth-child(6) { transform: translate(10px, -50px) rotate(15deg); opacity: 0.7; }
        .signature-wrapper:hover span:nth-child(7) { transform: translate(40px, 10px) rotate(45deg); opacity: 0.7; }
        /* Для остальных букв (Signature) */
        .signature-wrapper:hover span:nth-child(n+8) { transform: translate(0px, 40px) scale(1.2); opacity: 0.5; }

        .back-link {
            display: block; text-align: center; margin-top: 25px;
            color: #64748b; text-decoration: none; font-size: 14px;
        }
    </style>
</head>
<body>

    <div>
        <div class="card">
            <h1>Internationals</h1>
            
            <div class="sender-form-field" data-sender-form-id="dL9p2w"></div>
            
            <div class="signature-wrapper">
                <div class="digital-signature">
                    <span>D</span><span>i</span><span>g</span><span>i</span><span>t</span><span>a</span><span>l</span>
                    <span>&nbsp;</span>
                    <span>S</span><span>i</span><span>g</span><span>n</span><span>a</span><span>t</span><span>u</span><span>r</span><span>e</span>
                </div>
            </div>
        </div>
        
        <a href="index.html" class="back-link">← На главную</a>
    </div>

    <script>
      (function (s, e, n, d, er) {
        s['Sender'] = er; s[er] = s[er] || function () { (s[er].q = s[er].q || []).push(arguments) }, s[er].l = 1 * new Date();
        var a = e.createElement(n), m = e.getElementsByTagName(n)[0];
        a.async = 1; a.src = d; m.parentNode.insertBefore(a, m)
      })(window, document, 'script', 'https://cdn.sender.net/accounts_resources/universal.js', 'sender');
      sender('456b04acf96531')
    </script>
</body>
</html>
