<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnership | Internationals</title>
    <link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #0d121f; font-family: 'Inter', sans-serif; color: white; }
        .wrapper { display: flex; flex-direction: column; align-items: center; padding: 40px 0; }
        
        /* КАРТОЧКА-ЗАМОК */
        .card { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5); position: relative; z-index: 100; margin-bottom: 50px; color: #333; }
        .brand-name { color: #3b82f6; font-size: 26px; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; display: block; }

        /* СТЕНА СТАТЕЙ */
        #articlesWall { width: 90%; max-width: 800px; filter: blur(20px); transition: 0.8s; pointer-events: none; }
        .unlocked { filter: blur(0) !important; pointer-events: auto !important; }

        .article-block { background: rgba(255,255,255,0.03); padding: 40px; margin-bottom: 40px; border-radius: 15px; border-left: 5px solid #3b82f6; }
        .article-block h2 { color: #3b82f6; font-size: 32px; margin-top: 0; margin-bottom: 20px; }
        .article-block p { line-height: 1.8; color: #cbd5e1; font-size: 18px; margin-bottom: 15px; }

        /* ПОДПИСЬ */
        .sig-container { position: absolute; left: 50%; transform: translateX(-50%); top: 92%; width: 100vw; height: 180px; display: flex; justify-content: center; pointer-events: none; z-index: 15; }
        canvas { width: 800px !important; height: 180px !important; }
        .back-link { color: #64748b; text-decoration: none; margin-top: 50px; display: block; }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- ФОРМА -->
        <div id="lockCard" class="card">
            <span class="brand-name">Internationals</span>
            <div class="sender-form-field" data-sender-form-id="dL9p2w"></div>
            <button id="unlockBtn" onclick="unlock()" style="display:none; width:100%; padding:15px; background:#3b82f6; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; margin-top:15px;">СМОТРЕТЬ СТАТЬИ</button>
            <div class="sig-container"><canvas id="canvas-signature"></canvas></div>
        </div>

        <!-- СЮДА ВСЁ ВСТАВИТСЯ САМО -->
        <div id="articlesWall"></div>

        <a href="#" onclick="window.close(); return false;" class="back-link">← На главную</a>
    </div>

    <script>
        // ЧИТАЕМ ВАШ ТЕКСТОВЫЙ ФАЙЛ
        fetch('articles.txt')
            .then(response => response.text())
            .then(data => {
                const wall = document.getElementById('articlesWall');
                // Делим текст на блоки (по две пустые строки между статьями)
                const articles = data.split('\n\n\n'); 
                
                articles.forEach(article => {
                    const lines = article.trim().split('\n');
                    if (lines.length > 0) {
                        const div = document.createElement('div');
                        div.className = 'article-block';
                        
                        // Первая строка — заголовок, остальное — текст
                        const h2 = document.createElement('h2');
                        h2.textContent = lines[0];
                        div.appendChild(h2);
                        
                        for (let i = 1; i < lines.length; i++) {
                            if (lines[i].trim() !== "") {
                                const p = document.createElement('p');
                                p.textContent = lines[i];
                                div.appendChild(p);
                            }
                        }
                        wall.appendChild(div);
                    }
                });
            });

        function unlock() {
            document.getElementById('articlesWall').classList.add('unlocked');
            document.getElementById('lockCard').style.display = 'none';
        }
        setTimeout(() => { document.getElementById('unlockBtn').style.display = 'block'; }, 4000);
    </script>

    <!-- ТВОИ СКРИПТЫ С ПОДПИСЬЮ (БЕЗ ИЗМЕНЕНИЙ) -->
    <script src="https://cdn.sender.net/accounts_resources/universal.js"></script>
    <script>
        // Тот самый скрипт для canvas-signature, который ты уже знаешь
        (function (s, e, n, d, er) {
            s['Sender'] = er; s[er] = s[er] || function () { (s[er].q = s[er].q || []).push(arguments) }, s[er].l = 1 * new Date();
            var a = e.createElement(n), m = e.getElementsByTagName(n)[0];
            a.async = 1; a.src = d; m.parentNode.insertBefore(a, m)
        })(window, document, 'script', 'https://cdn.sender.net/accounts_resources/universal.js', 'sender');
        sender('456b04acf96531');

        // Код анимации подписи...
        const canvas = document.getElementById('canvas-signature');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 180;
        // ... (остальной код анимации как в оригинале) ...
    </script>
</body>
</html>
