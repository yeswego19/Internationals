<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnership | Internationals</title>
    <link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #0d121f; font-family: 'Inter', sans-serif; color: white; overflow-x: hidden; }
        .wrapper { display: flex; flex-direction: column; align-items: center; padding: 40px 0; width: 100%; }
        
        /* КАРТОЧКА */
        .card { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5); position: relative; z-index: 100; margin-bottom: 50px; color: #333; }
        .brand-name { color: #3b82f6; font-size: 26px; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; display: block; }

        /* СТЕНА СТАТЕЙ */
        #articlesWall { width: 90%; max-width: 800px; filter: blur(25px); transition: 1s ease; pointer-events: none; }
        .unlocked { filter: blur(0) !important; pointer-events: auto !important; }

        .article-block { background: rgba(255,255,255,0.03); padding: 40px; margin-bottom: 40px; border-radius: 15px; border-left: 5px solid #3b82f6; }
        .article-block h2 { color: #3b82f6; font-size: 32px; margin: 0 0 20px 0; }
        .article-block p { line-height: 1.8; color: #cbd5e1; font-size: 18px; margin-bottom: 15px; }

        /* ПОДПИСЬ - ВОЗВРАЩАЕМ ЦЕЛИКОМ */
        .sig-container { position: absolute; left: 50%; transform: translateX(-50%); top: 92%; width: 100vw; height: 180px; display: flex; justify-content: center; pointer-events: none; z-index: 15; }
        canvas { width: 800px !important; height: 180px !important; }
        
        .unlock-btn { display: none; width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px; font-size: 16px; }
        .back-link { color: #64748b; text-decoration: none; margin-top: 50px; display: block; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div id="lockCard" class="card">
            <span class="brand-name">Internationals</span>
            <div class="sender-form-field" data-sender-form-id="dL9p2w"></div>
            
            <button id="unlockBtn" class="unlock-btn" onclick="unlock()">ЧИТАТЬ СТАТЬИ</button>

            <div class="sig-container">
                <canvas id="canvas-signature"></canvas>
            </div>
        </div>

        <div id="articlesWall"></div>
        <a href="#" onclick="window.close(); return false;" class="back-link">← На главную</a>
    </div>

    <script>
        // ЗАГРУЗКА ТЕКСТА
        fetch('articles.txt')
            .then(res => res.text())
            .then(data => {
                const wall = document.getElementById('articlesWall');
                const articles = data.split('\n\n\n');
                articles.forEach(article => {
                    const lines = article.trim().split('\n');
                    if (lines.length > 0) {
                        const div = document.createElement('div');
                        div.className = 'article-block';
                        const h2 = document.createElement('h2');
                        h2.textContent = lines[0];
                        div.appendChild(h2);
                        for (let i = 1; i < lines.length; i++) {
                            if (lines[i].trim() !== "") {
                                const p = document.createElement('p');
                                p.textContent = lines[i];
                                div.appendChild(p);
                            }
                        }
                        wall.appendChild(div);
                    }
                });
            });

        function unlock() {
            document.getElementById('articlesWall').classList.add('unlocked');
            document.getElementById('lockCard').style.display = 'none';
        }

        // Кнопка появится ТОЛЬКО если человек пришел после заполнения формы
        if (window.location.search.includes('unlock')) {
            document.getElementById('unlockBtn').style.display = 'block';
        }
        // Чтобы ТЫ мог потестить сейчас без Sender, я оставлю её видимой, но без таймера.
        // Если хочешь скрыть её совсем до заполнения — удали строчку ниже:
        document.getElementById('unlockBtn').style.display = 'block'; 
    </script>

    <script>
        // ПОЛНЫЙ КОД ПОДПИСИ (ВОЗВРАЩЕН)
        const canvas = document.getElementById('canvas-signature');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 180;
        let particles = [];
        let mouse = { x: -1000, y: -1000, radius: 75 };

        function init() {
            ctx.fillStyle = 'white';
            ctx.font = '85px "Reenie Beanie"';
            ctx.textAlign = 'center';
            ctx.fillText('Digital Signature', 400, 100);
            const data = ctx.getImageData(0, 0, 800, 180);
            particles = [];
            for (let y = 0; y < data.height; y += 4) {
                for (let x = 0; x < data.width; x += 4) {
                    if (data.data[(y * 4 * data.width) + (x * 4) + 3] > 128) {
                        particles.push({x: Math.random()*800, y: Math.random()*180, destX: x, destY: y, vx:0, vy:0});
                    }
                }
            }
        }
        function animate() {
            ctx.clearRect(0, 0, 800, 180);
            particles.forEach(p => {
                let dx = p.x - mouse.x; let dy = p.y - mouse.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < mouse.radius) { p.vx += dx/7; p.vy += dy/7; }
                p.vx += (p.destX - p.x) * 0.18; p.vy += (p.destY - p.y) * 0.18;
                p.vx *= 0.75; p.vy *= 0.75;
                p.x += p.vx; p.y += p.vy;
                ctx.fillStyle = 'rgba(59, 130, 246, 0.7)';
                ctx.beginPath(); ctx.arc(p.x, p.y, 1.6, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = (e.clientX - rect.left) * (800 / rect.width);
            mouse.y = (e.clientY - rect.top) * (180 / rect.height);
        });
        document.fonts.ready.then(() => { init(); animate(); });
    </script>
    <script src="https://cdn.sender.net/accounts_resources/universal.js"></script>
    <script>sender('456b04acf96531');</script>
</body>
</html>
