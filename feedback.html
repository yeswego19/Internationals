  <style>
    :root{ --accent-1:#1f3f83; --accent-2:#2f5597; --danger:#d9534f; }
    html,body{ height:100%; margin:0; }
    body{
      font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
      background:#E89344 url('feedback-bg.jpg') top center / 100% auto no-repeat;
      min-height:100vh; opacity:0; transition:opacity .35s ease;
    }
    body.loaded{ opacity:1; }
    .feedback-container{
      max-width:760px; margin:48px auto; padding:30px;
      border-radius:12px; background:rgba(255,255,255,0.02);
      backdrop-filter:blur(8px); box-shadow:0 8px 30px rgba(0,0,0,0.25);
      border:1px solid rgba(255,255,255,0.12);
    }
    .feedback-header{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; }
    .feedback-header h2{ margin:0; color:#fff; font-size:22px; line-height:1; }
    .close-btn{ background:transparent; border:0; color:#fff; font-size:46px; cursor:pointer; line-height:1; padding:0 4px; transition:color .2s,transform .2s; }
    .close-btn:hover{ color:#ff4444; transform:translateX(-4px); }
    .feedback-form{ margin-top:8px; }
    .feedback-form input,.feedback-form textarea{
      width:100%; padding:12px; margin:8px 0; border-radius:8px;
      border:2px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.12);
      font-size:15px; box-sizing:border-box; color:#000 !important;
    }
    .feedback-form input::placeholder,.feedback-form textarea::placeholder{ color:#666; }
    .feedback-form button{
      display:block; width:100%; padding:14px; margin-top:12px;
      border-radius:8px; border:0; cursor:pointer; color:#fff;
      font-weight:600; font-size:15px;
      background:linear-gradient(135deg,var(--accent-2),var(--accent-1));
      transition:transform .15s,box-shadow .15s;
    }
    .feedback-form button:hover{ transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,0.15); }
    .feedback-form button:disabled{ opacity:.6; cursor:not-allowed; }
    .audio-buttons{ display:flex; gap:10px; flex-direction:column; margin-top:8px; }
    #recordBtn{ background:linear-gradient(135deg,var(--accent-2),var(--accent-1)); border:0; padding:12px; border-radius:8px; cursor:pointer; color:#fff; }
    #recordBtn.recording{ animation:pulse 1.5s infinite; }
    @keyframes pulse{
      0%{ box-shadow:0 0 0 0 rgba(220,38,38,0.7); }
      50%{ box-shadow:0 0 0 12px rgba(220,38,38,0); }
      100%{ box-shadow:0 0 0 0 rgba(220,38,38,0.7); }
    }
    #stopBtn{ background:var(--danger); color:#fff; border:0; padding:12px; border-radius:8px; }
    #stopBtn:disabled{ opacity:.5; cursor:not-allowed; }
    .visualizer-container{ display:none; margin-top:12px; padding:12px; border-radius:8px; background:rgba(255,255,255,0.04); }
    #visualizer{ width:100%; height:80px; border-radius:6px; background:rgba(0,0,0,0.25); display:block; }
    .volume-meter{ width:100%; height:8px; border-radius:4px; background:rgba(0,0,0,0.2); overflow:hidden; margin-top:8px; }
    .volume-bar{ height:100%; width:0%; transition:width .1s; background:linear-gradient(90deg,#10b981,#ef4444); }
    .audio-preview{ display:none; margin-top:10px; background:rgba(255,255,255,0.04); padding:10px; border-radius:8px; }
    .audio-preview audio{ width:100%; display:block; margin-bottom:8px; }
    .feedback-list-title{ color:#fff; font-size:18px; font-weight:600; margin-top:18px; margin-bottom:12px; }
    .feedback-item{ background:rgba(255,255,255,0.12); padding:12px; border-radius:8px; margin-bottom:12px; border-left:4px solid #1f4ba5; color:#000 !important; }
    .feedback-item strong{ font-size:15px; }
    .feedback-item small{ float:right; color:#333; font-size:12px; }
    .admin-reply{ margin-top:10px; padding:10px; background:rgba(240,249,255,0.9); border-left:3px solid #3b82f6; border-radius:6px; }
    .error{ text-align:center; color:#fff; padding:14px; }

    /* Loading spinner */
    .loading-container{ text-align:center; padding:30px 10px; }
    .spinner{
      width:40px; height:40px; margin:0 auto 12px;
      border:4px solid rgba(255,255,255,0.15);
      border-top-color:#fff; border-radius:50%;
      animation:spin .8s linear infinite;
    }
    @keyframes spin{ to{ transform:rotate(360deg); } }
    .loading-text{ color:#fff; font-size:14px; opacity:.85; }
    .loading-subtext{ font-size:12px; opacity:.55; margin-top:4px; }

    .fixed-banner-left,
    .fixed-banner-right {
      position: fixed;
      bottom: -100vh;
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      will-change: transform;
      transition: bottom 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  opacity 0.8s ease;
    }
    .fixed-banner-left  { left: 8px; width: 300px; }
    .fixed-banner-right { right: 8px; width: 300px; }

    @media(max-width:1500px){
      .fixed-banner-left  { width: 220px; }
      .fixed-banner-right { width: 220px; }
    }
    @media(max-width:1300px){
      .fixed-banner-left  { width: 160px; }
      .fixed-banner-right { width: 160px; }
    }

    .fixed-banner-left.sliding,
    .fixed-banner-right.sliding {
      bottom: 20px;
      opacity: 1;
      pointer-events: auto;
    }

    .fixed-banner-left.stuck,
    .fixed-banner-right.stuck {
      position: absolute;
      bottom: auto;
      opacity: 1;
      pointer-events: auto;
      transition: none;
    }

    .banner-card{
      width: 100%;
      box-sizing: border-box;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:10px; padding:10px; text-align:center; transition:box-shadow .2s;
    }
    .banner-card:hover{ box-shadow:0 8px 24px rgba(0,0,0,0.25); }
    .banner-card img{ width:100% !important; height:auto !important; border-radius:6px; display:block; margin:0 auto; }
    .banner-label{ font-size:10px; color:rgba(255,255,255,0.35); margin-top:6px; letter-spacing:.05em; text-transform:uppercase; }

    .cvc-banner{
      width:100%; aspect-ratio: 330 / 230; height:auto;
      border-radius:8px; overflow:hidden;
      position:relative; cursor:pointer; display:block; text-decoration:none; background:#0a1628;
    }
    .cvc-slides{ position:absolute; inset:0; }
    .cvc-slide{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 1s ease; }
    .cvc-slide.cvc-active{ opacity:1; }
    .cvc-dots{ position:absolute; top:8px; left:50%; transform:translateX(-50%); display:flex; gap:5px; z-index:3; }
    .cvc-dot{ width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.4); transition:background .3s; }
    .cvc-dot.cvc-dot-active{ background:#fff; }
    .cvc-text-overlay{ position:absolute; bottom:0; left:0; right:0; padding:10px 12px; background:linear-gradient(transparent,rgba(0,20,60,.9)); color:#fff; font-family:'Inter',sans-serif; z-index:2; }
    .cvc-title{ font-size:13px; font-weight:700; letter-spacing:.04em; text-shadow:0 1px 4px rgba(0,0,0,.7); }
    .cvc-sub{ font-size:10px; opacity:.85; margin-top:2px; color:#cce4ff; }
    .cvc-cta{ display:inline-block; margin-top:5px; padding:3px 10px; background:linear-gradient(135deg,#1565c0,#0288d1); border-radius:20px; font-size:10px; font-weight:600; color:#fff; }

    .mobile-banners{ display:none; flex-wrap:wrap; gap:12px; justify-content:center; margin-top:16px; }

    @media(max-width:1100px){
      .fixed-banner-left,.fixed-banner-right{ display:none !important; }
      .mobile-banners{ display:flex; }
      .feedback-container{ margin:18px; padding:18px; }
    }
  </style>
</head>

  <script>
    /* ===== Translations & language ===== */
    var translations = {

      zh:{ feedback:"反馈", name:"您的姓名", message:"您的印象、建议、联系方式(可选)", record:"🎙 录音", stop:"⏹ 停止录音", delete:"🗑 删除并重新录音", send:"发送反馈", recent:"最新评论", loading:"正在加载评论...", sending:"发送中...", sent:"✅ 已发送!", replyLabel:"我们的回复:" },
      ar:{ feedback:"الملاحظات", name:"اسمك", message:"انطباعاتك، نصائحك، جهات الاتصال (اختياري)", record:"🎙 تسجيل الصوت", stop:"⏹ إيقاف التسجيل", delete:"🗑 حذف وإعادة التسجيل", send:"إرسال الملاحظات", recent:"أحدث التعليقات", loading:"جاري تحميل التعليقات...", sending:"جاري الإرسال...", sent:"✅ تم الإرسال!", replyLabel:"ردنا:" }
    };
    function getPreferredLang() {
      return localStorage.getItem('language') || localStorage.getItem('userLang') ||
             (navigator.language || navigator.userLanguage || 'en').split('-')[0] || 'en';
    }
    function applyTranslations() {
      var lang = getPreferredLang(), t = translations[lang] || translations.en;
      document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
      document.querySelectorAll('.translate').forEach(function(el){
        var key = el.dataset.key; if(!key) return;
        var val = t[key] || translations.en[key] || el.textContent;
        var tag = el.tagName.toLowerCase();
        if(tag==='input'||tag==='textarea') el.placeholder = val; else el.textContent = val;
      });
    }
    window.addEventListener('DOMContentLoaded', applyTranslations);
    window.addEventListener('load', function(){ document.body.classList.add('loaded'); });

  <!-- ===== Supabase: load with defer, init on script-load event (no polling) ===== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer onload="window.__sbReady && window.__sbReady()"></script>
  <script>
    var SUPABASE_URL = 'https://mcgcijdnzduzyqbbjtkm.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jZ2NpamRuemR1enlxYmJqdGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQzMDk1NzksImV4cCI6MjA3OTg4NTU3OX0.rhiArHGVbMt0nOgEeP-qGzL0ZuX3Cr1EoOMR1w3dDQ0';
    var sb = null;

    window.__sbReady = function(){
      if (window.supabase && window.supabase.createClient && !sb) {
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        initApp();
      }
    };
    // Fallback in case onload fires before this script runs, or defer ordering quirk
    document.addEventListener('DOMContentLoaded', function(){
      if (window.supabase && !sb) window.__sbReady();
    });
    // Hard fallback: if nothing happened after 4s, show a real error (not infinite spinner)
    setTimeout(function(){
      if (!sb) {
        var el = document.getElementById('feedbackList');
        if (el) el.innerHTML = '<p class="error">Failed to load feedback. Please refresh the page.</p>';
      }
    }, 4000);

    function initApp() {
      var feedbackList=document.getElementById('feedbackList'), feedbackForm=document.getElementById('feedbackForm'),
          submitBtn=document.getElementById('submitBtn'), errorMessage=document.getElementById('errorMessage'),
          recordBtn=document.getElementById('recordBtn'), stopBtn=document.getElementById('stopBtn'),
          deleteBtn=document.getElementById('deleteBtn'), visualizerContainer=document.getElementById('visualizerContainer'),
          audioPreview=document.getElementById('audioPreview'), previewPlayer=document.getElementById('previewPlayer'),
          canvas=document.getElementById('visualizer'), canvasCtx=canvas.getContext('2d'),
          volumeBar=document.getElementById('volumeBar'), recordStatus=document.getElementById('recordStatus');
      var mediaRecorder=null,audioChunks=[],audioBlob=null,audioContext=null,
          analyser=null,dataArray=null,animationId=null,recordTimer=null,stream=null;

      function drawWaveform(){
        animationId=requestAnimationFrame(drawWaveform);
        if(!analyser||!dataArray) return;
        analyser.getByteTimeDomainData(dataArray);
        canvasCtx.fillStyle='rgba(0,0,0,0.18)'; canvasCtx.fillRect(0,0,canvas.width,canvas.height);
        canvasCtx.lineWidth=3; canvasCtx.beginPath();
        var sliceW=canvas.width/dataArray.length, x=0, maxAmp=0;
        for(var i=0;i<dataArray.length;i++){
          var v=dataArray[i]/128.0, y=v*canvas.height/2, amp=Math.abs(v-1.0);
          if(amp>maxAmp) maxAmp=amp;
          if(i===0) canvasCtx.moveTo(x,y); else canvasCtx.lineTo(x,y);
          x+=sliceW;
        }
        canvasCtx.lineTo(canvas.width,canvas.height/2);
        canvasCtx.strokeStyle=maxAmp>0.7?'#ef4444':maxAmp>0.3?'#10b981':'#6b7280';
        canvasCtx.stroke();
        volumeBar.style.width=Math.min(Math.round(maxAmp*200),100)+'%';
      }

      recordBtn.addEventListener('click', async function(){
        try{
          stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});
          audioContext=new(window.AudioContext||window.webkitAudioContext)();
          analyser=audioContext.createAnalyser();
          audioContext.createMediaStreamSource(stream).connect(analyser);
          analyser.fftSize=2048; analyser.smoothingTimeConstant=0.8;
          dataArray=new Uint8Array(analyser.frequencyBinCount);
          canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight;
          visualizerContainer.style.display='block'; recordBtn.classList.add('recording'); drawWaveform();
          var mimeType='';
          if(MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')) mimeType='audio/ogg;codecs=opus';
          else if(MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) mimeType='audio/webm;codecs=opus';
          else if(MediaRecorder.isTypeSupported('audio/webm')) mimeType='audio/webm';
          mediaRecorder=new MediaRecorder(stream,mimeType?{mimeType}:{});
          audioChunks=[];
          mediaRecorder.ondataavailable=function(e){ if(e.data&&e.data.size>0) audioChunks.push(e.data); };
          mediaRecorder.onstop=function(){
            audioBlob=new Blob(audioChunks,{type:mimeType||'audio/webm'});
            previewPlayer.src=URL.createObjectURL(audioBlob);
            audioPreview.style.display='block'; visualizerContainer.style.display='none';
            recordBtn.classList.remove('recording');
            recordStatus.textContent='✅ Ready ('+(audioBlob.size/1024).toFixed(1)+' KB)';
            if(animationId) cancelAnimationFrame(animationId);
            if(recordTimer) clearTimeout(recordTimer);
            if(stream){ stream.getTracks().forEach(function(t){t.stop();}); stream=null; }
            if(audioContext){ audioContext.close(); audioContext=null; }
          };
          mediaRecorder.start(); recordBtn.disabled=true; stopBtn.disabled=false;
          recordStatus.textContent='🔴 Recording... (max 2 min)';
          recordTimer=setTimeout(function(){
            if(mediaRecorder&&mediaRecorder.state==='recording'){
              mediaRecorder.stop(); recordBtn.disabled=false; stopBtn.disabled=true;
              recordStatus.textContent='⏱ Stopped (2 min limit)';
            }
          },120000);
        }catch(err){ showError('Cannot access microphone'); console.error(err); }
      });

      stopBtn.addEventListener('click',function(){
        if(mediaRecorder&&mediaRecorder.state==='recording'){
          mediaRecorder.stop(); recordBtn.disabled=false; stopBtn.disabled=true;
          recordBtn.classList.remove('recording'); if(recordTimer) clearTimeout(recordTimer);
        }
      });

      deleteBtn.addEventListener('click',function(){
        audioBlob=null; audioPreview.style.display='none'; previewPlayer.src='';
        recordStatus.textContent=''; recordBtn.disabled=false; stopBtn.disabled=true;
      });

      var CACHE_KEY='cachedFeedbackV1';

      function renderFeedback(rows){
        var lang=getPreferredLang();
        if(!rows || rows.length===0){
          feedbackList.innerHTML='<p style="text-align:center;color:#ddd">'+(translations[lang]||translations.en).loading+'</p>';
          return;
        }
        var frag=document.createDocumentFragment();
        rows.forEach(function(item){
          var div=document.createElement('div'); div.className='feedback-item';
          var date=new Date(item.created_at).toLocaleString(undefined,{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit',year:'numeric'});
          var html='<strong translate="no">'+esc(item.contact||'Anonymous')+'</strong><small>'+date+'</small><p translate="no">'+esc(item.message)+'</p>';
          if(item.audio_url) html+='<audio controls preload="metadata" src="'+item.audio_url+'"></audio>';
          if(item.reply&&item.reply.trim()){
            var lbl=((translations[lang]||translations.en).replyLabel)||'Our reply:';
            html+='<div class="admin-reply"><div class="admin-reply-label">'+esc(lbl)+'</div><p class="admin-reply-text" translate="no">'+esc(item.reply)+'</p></div>';
          }
          div.innerHTML=html; frag.appendChild(div);
        });
        feedbackList.innerHTML='';
        feedbackList.appendChild(frag);
      }

      // 1. Показать кэш мгновенно, если он есть
      try{
        var cached = localStorage.getItem(CACHE_KEY);
        if(cached){ renderFeedback(JSON.parse(cached)); }
      }catch(e){}

      async function loadFeedback(){
        try{
          var res=await sb.from('feedback').select('*').order('created_at',{ascending:false}).limit(50);
          if(res.error) throw res.error;
          renderFeedback(res.data);
          try{ localStorage.setItem(CACHE_KEY, JSON.stringify(res.data)); }catch(e){}
        }catch(err){
          console.error(err);
          // Если есть кэш — оставляем его на экране, не затираем ошибкой
          if(!localStorage.getItem(CACHE_KEY)){
            feedbackList.innerHTML='<p class="error">Failed to load feedback</p>';
          }
        }
      }

      feedbackForm.addEventListener('submit', async function(e){
        e.preventDefault();
        var name=document.getElementById('name').value.trim(), message=document.getElementById('message').value.trim();
        if(!name||!message){ showError('Please fill in name and message'); return; }
        if(audioBlob&&audioBlob.size<100){ showError('Audio too short or corrupted'); return; }
        submitBtn.disabled=true;
        var lang=getPreferredLang();
        submitBtn.textContent=(translations[lang]||translations.en).sending||'Sending...';
        try{
          var audioUrl=null;
          if(audioBlob){
            var ext=audioBlob.type.includes('ogg')?'ogg':'webm';
            var fileName='voice-'+Date.now()+'.'+ext;
            var up=await sb.storage.from('voice-feedback').upload(fileName,audioBlob,{contentType:audioBlob.type,upsert:false});
            if(up.error) throw up.error;
            var pub=sb.storage.from('voice-feedback').getPublicUrl(fileName);
            audioUrl=pub.data?.publicUrl||null;
          }
          var ins=await sb.from('feedback').insert([{contact:name,message:message,audio_url:audioUrl}]);
          if(ins.error) throw ins.error;
          feedbackForm.reset(); audioBlob=null; audioPreview.style.display='none';
          previewPlayer.src=''; visualizerContainer.style.display='none';
          recordStatus.textContent=''; recordBtn.disabled=false; stopBtn.disabled=true;
          await loadFeedback();
          submitBtn.textContent=(translations[lang]||translations.en).sent||'✅ Sent!';
          setTimeout(function(){ submitBtn.textContent=(translations[getPreferredLang()]||translations.en).send||'Send Feedback'; },1700);
        }catch(err){ console.error(err); showError('Failed to send - check console'); }
        finally{ submitBtn.disabled=false; }
      });

      function showError(msg){ errorMessage.innerHTML='<div class="error">'+esc(msg)+'</div>'; setTimeout(function(){ errorMessage.innerHTML=''; },5000); }
      function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

      loadFeedback();
      setInterval(loadFeedback, 10000);
    }
  </script>

      function initCvc(bannerId, dotsId) {
        var b = document.getElementById(bannerId); if(!b) return;
        var slides = b.querySelectorAll('.cvc-slide');
        var dotsHolder = document.getElementById(dotsId);
        var dots = dotsHolder ? dotsHolder.querySelectorAll('.cvc-dot') : [];
        if(slides.length < 2) return;
        var cur = 0;
        setInterval(function(){
          slides[cur].classList.remove('cvc-active');
          if(dots[cur]) dots[cur].classList.remove('cvc-dot-active');
          cur = (cur+1) % slides.length;
          slides[cur].classList.add('cvc-active');
          if(dots[cur]) dots[cur].classList.add('cvc-dot-active');
        }, 2500);
      }

      function loadTpScript(slotId, query){

      function setupStickyBanners(){
        var bannerLeft = document.getElementById('bannerLeft');
        var bannerRight = document.getElementById('bannerRight');
        var feedbackListEl = document.getElementById('feedbackList');
        var shown = false, stuck = false;

        function stickToPage() {
          if (stuck) return;
          stuck = true;
          var rL = bannerLeft.getBoundingClientRect();
          var rR = bannerRight.getBoundingClientRect();
          bannerLeft.classList.remove('sliding'); bannerLeft.classList.add('stuck');
          bannerLeft.style.top  = (rL.top + window.scrollY) + 'px';
          bannerLeft.style.left = rL.left + 'px';
          bannerRight.classList.remove('sliding'); bannerRight.classList.add('stuck');
          bannerRight.style.top  = (rR.top + window.scrollY) + 'px';
          bannerRight.style.left = rR.left + 'px';
        }
        function showBanners() {
          if (shown) return;
          shown = true;
          bannerLeft.classList.add('sliding');
          bannerRight.classList.add('sliding');
          setTimeout(stickToPage, 2700);
        }
        function check() {
          if (shown) return;
          var rect = feedbackListEl.getBoundingClientRect();
          if (rect.bottom <= window.innerHeight + 50) showBanners();
        }
        window.addEventListener('scroll', check, { passive: true });
        new MutationObserver(check).observe(feedbackListEl, { childList: true, subtree: true });
        setTimeout(check, 700);
      }

      // Ждём, пока браузер освободится (idle), но не позже 1.5с — отзывы и форма успевают отрендериться первыми
      function scheduleAds(){
        if('requestIdleCallback' in window){

          setTimeout(injectBanners, 1200);
        }
      }
      if(document.readyState === 'complete'){ scheduleAds(); }
      else{ window.addEventListener('load', scheduleAds); }
    })();
