<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Loading Article... | Internationals.pro</title>
    <meta id="meta-desc" name="description" content="">
    <meta id="meta-keys" name="keywords" content="">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }
        .close-btn {
            position: fixed;
            top: 15px;
            right: 20px;
            background: transparent;
            border: none;
            color: #d9534f;
            font-size: 52px;
            cursor: pointer;
            z-index: 9999;
            padding: 0 8px;
            line-height: 1;
        }
        .close-btn:hover { color: #ff0000; transform: scale(1.1); }
        .globe {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 68px;
            height: 68px;
            cursor: pointer;
            z-index: 9999;
            border: none;
            background: transparent;
            padding: 0;
            animation: spin 10s linear infinite;
        }
        .globe img { width: 100%; height: 100%; object-fit: contain; }
        .globe:hover { transform: scale(1.1); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .date { color: #666; font-size: 0.9em; margin: -10px 0 20px 0; }
        .source { margin-top: 40px; font-size: 0.9em; border-top: 1px solid #eee; padding-top: 20px; }
        .main-img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 8px; margin-bottom: 25px; }
    </style>
</head>
<body>

    <button class="close-btn" onclick="window.close()">←</button>

    <a class="globe" id="globeLink" href="#" target="_blank">
        <img src="assets/globe.png" alt="Translate">
    </a>

    <h1 id="article-title">Loading...</h1>
    <div id="article-date" class="date"></div>
    <div id="article-image-wrapper"></div>
    <div id="article-body"></div>
    <p id="article-source" class="source"></p>

    <script>
        const WORKER_URL = 'https://my-vpn-proxy.yeswego19.workers.dev';

        document.getElementById('globeLink').addEventListener('click', function(e) {
            e.preventDefault();
            const lang = (navigator.language || 'en').split('-')[0];
            if (lang === 'en') { alert('Your browser language is English.'); return; }
            window.open(`https://translate.google.com/translate?sl=en&tl=${lang}&u=${encodeURIComponent(location.href)}`, '_blank');
        });

        async function loadArticle() {
            const slug = new URLSearchParams(location.search).get('slug');
            if (!slug) {
                document.getElementById('article-title').innerText = 'Article not found';
                return;
            }

            try {
                const res = await fetch(`${WORKER_URL}/article?slug=${encodeURIComponent(slug)}`);
                const article = await res.json();

                if (!article || article.error) {
                    document.getElementById('article-title').innerText = 'Article not found';
                    return;
                }

                document.title = `${article.title} | Internationals.pro`;
                document.getElementById('meta-desc').content = article.meta_description || '';
                document.getElementById('meta-keys').content = article.keywords || '';
                document.getElementById('article-title').innerText = article.title;
                document.getElementById('article-date').innerText = new Date(article.created_at).toLocaleDateString('en-US', {
                    day: 'numeric', month: 'long', year: 'numeric'
                });

                if (article.image_url) {
                    document.getElementById('article-image-wrapper').innerHTML =
                        `<img src="${article.image_url}" class="main-img" alt="${article.title}" onerror="this.style.display='none'">`;
                }

                document.getElementById('article-body').innerText = article.summary || '';

                if (article.source_url) {
                    document.getElementById('article-source').innerHTML =
                        `Original source: <a href="${article.source_url}" target="_blank" rel="noopener">View Original</a>`;
                }

            } catch(e) {
                document.getElementById('article-title').innerText = 'Error loading article';
            }
        }

        loadArticle();
    </script>
</body>
</html>
