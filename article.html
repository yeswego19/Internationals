<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Loading Article... | Internationals.pro</title>
    <meta id="meta-desc" name="description" content="">
    <meta id="meta-keys" name="keywords" content="">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }

        /* ===== ГЛОБУС ===== */
        .globe {
            position: fixed;
            top: 15px;
            right: 80px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 9999;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            border: none;
            text-decoration: none;
            user-select: none;
        }

        .globe:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 6px 25px rgba(59, 130, 246, 0.6);
        }

        .globe:active {
            transform: scale(0.95);
        }

        /* ===== КНОПКА ЗАКРЫТИЯ ===== */
        .close-btn {
            position: fixed;
            top: 15px;
            right: 20px;
            background: transparent;
            border: none;
            color: #d9534f;
            font-size: 52px;
            cursor: pointer;
            z-index: 9999;
            transition: all 0.2s ease;
            padding: 0 8px;
            line-height: 1;
        }

        .close-btn:hover {
            color: #ff0000;
            transform: scale(1.1);
        }

        /* ===== ВЫПАДАЮЩЕЕ МЕНЮ ЯЗЫКОВ ===== */
        #languageDropdown {
            position: fixed;
            top: 70px;
            right: 20px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.2);
            padding: 8px 0;
            min-width: 160px;
            z-index: 10000;
            display: none;
            border: 1px solid #e5e7eb;
        }

        #languageDropdown.show {
            display: block;
        }

        .language-option {
            padding: 10px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            transition: background 0.15s;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            color: #333;
        }

        .language-option:hover {
            background: #f3f4f6;
        }

        .language-option span {
            color: #6b7280;
            font-size: 13px;
        }

        .language-option.active {
            background: #e0e7ff;
            color: #1d4ed8;
        }

        .language-option.active span {
            color: #1d4ed8;
        }

        /* ===== СТИЛИ СТАТЬИ ===== */
        .date {
            color: #666;
            font-size: 0.9em;
            margin: -10px 0 20px 0;
        }

        .source {
            margin-top: 40px;
            font-size: 0.9em;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .main-img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 25px;
            background-color: #f0f0f0;
        }

        @media (max-width: 600px) {
            .globe {
                top: 10px;
                right: 60px;
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            .close-btn {
                top: 10px;
                right: 10px;
                font-size: 40px;
            }
            #languageDropdown {
                top: 60px;
                right: 10px;
                min-width: 140px;
            }
            body {
                margin: 20px auto;
                padding-top: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== ГЛОБУС ===== -->
    <div class="globe" id="globeBtn" title="Change language">
        <i class="fas fa-globe"></i>
    </div>

    <!-- ===== ВЫПАДАЮЩЕЕ МЕНЮ ЯЗЫКОВ ===== -->
    <div id="languageDropdown">
        <button class="language-option" data-lang="en">EN <span>English</span></button>
        <button class="language-option" data-lang="ru">RU <span>Русский</span></button>
        <button class="language-option" data-lang="de">DE <span>Deutsch</span></button>
        <button class="language-option" data-lang="es">ES <span>Español</span></button>
        <button class="language-option" data-lang="pt">PT <span>Português</span></button>
        <button class="language-option" data-lang="zh">ZH <span>中文</span></button>
        <button class="language-option" data-lang="ar">AR <span>العربية</span></button>
    </div>

    <!-- ===== КНОПКА ЗАКРЫТИЯ ===== -->
    <button class="close-btn" onclick="closeTab()">←</button>

    <h1 id="article-title">Loading...</h1>
    <div id="article-date" class="date"></div>
    <div id="article-image-wrapper"></div>
    <div id="article-body"></div>
    <p id="article-source" class="source"></p>

    <script>
        // ===== ФУНКЦИЯ ЗАКРЫТИЯ ВКЛАДКИ =====
        function closeTab() {
            window.close();
        }

        // ===== ГЛОБУС И ЯЗЫКИ =====
        const globeBtn = document.getElementById('globeBtn');
        const dropdown = document.getElementById('languageDropdown');

        globeBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdown.classList.toggle('show');
        });

        document.addEventListener('click', function(e) {
            if (!dropdown.contains(e.target) && e.target !== globeBtn) {
                dropdown.classList.remove('show');
            }
        });

        document.querySelectorAll('.language-option').forEach(opt => {
            opt.addEventListener('click', function(e) {
                e.stopPropagation();
                const lang = this.dataset.lang;
                setLanguage(lang);
                dropdown.classList.remove('show');
            });
        });

        // ===== ПЕРЕВОДЫ ДЛЯ СТРАНИЦЫ СТАТЬИ =====
        const translations = {
            en: {
                loading: "Loading...",
                not_found: "Article not found",
                source: "Original source:"
            },
            ru: {
                loading: "Загрузка...",
                not_found: "Статья не найдена",
                source: "Оригинальный источник:"
            },
            de: {
                loading: "Laden...",
                not_found: "Artikel nicht gefunden",
                source: "Originalquelle:"
            },
            es: {
                loading: "Cargando...",
                not_found: "Artículo no encontrado",
                source: "Fuente original:"
            },
            pt: {
                loading: "Carregando...",
                not_found: "Artigo não encontrado",
                source: "Fonte original:"
            },
            zh: {
                loading: "加载中...",
                not_found: "未找到文章",
                source: "原始来源:"
            },
            ar: {
                loading: "جاري التحميل...",
                not_found: "المقال غير موجود",
                source: "المصدر الأصلي:"
            }
        };

        let currentLang = localStorage.getItem('blogLang') || 'en';

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('blogLang', lang);

            document.querySelectorAll('.language-option').forEach(opt => {
                opt.classList.toggle('active', opt.dataset.lang === lang);
            });

            document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
        }

        // ===== SUPABASE =====
        const SUPABASE_URL = "https://mcgcijdnzduzyqbbjtkm.supabase.co";
        const SUPABASE_KEY = "sb_publishable_CCc78qZY25XBUDqdYsX9_w_YyKTihee";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadArticle() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');
            const t = translations[currentLang] || translations.en;

            if (!slug) {
                document.getElementById('article-title').innerText = t.not_found;
                return;
            }

            const { data: article, error } = await _supabase
                .from('articles')
                .select('*')
                .eq('slug', slug)
                .single();

            if (error || !article) {
                document.getElementById('article-title').innerText = t.not_found;
                return;
            }

            document.title = `${article.title} | Internationals.pro`;
            document.getElementById('meta-desc').setAttribute('content', article.meta_description || '');
            document.getElementById('meta-keys').setAttribute('content', article.keywords || '');

            document.getElementById('article-title').innerText = article.title;
            document.getElementById('article-date').innerText = new Date(article.created_at).toLocaleDateString(
                currentLang === 'ru' ? 'ru-RU' : 
                currentLang === 'de' ? 'de-DE' :
                currentLang === 'es' ? 'es-ES' :
                currentLang === 'pt' ? 'pt-PT' :
                currentLang === 'zh' ? 'zh-CN' :
                currentLang === 'ar' ? 'ar-SA' : 'en-US', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });

            if (article.image_url) {
                document.getElementById('article-image-wrapper').innerHTML = `
                    <img src="${article.image_url}" class="main-img" alt="${article.title}">
                `;
            }

            document.getElementById('article-body').innerText = article.summary;

            if (article.source_url) {
                document.getElementById('article-source').innerHTML = `
                    ${t.source} <a href="${article.source_url}" target="_blank" rel="noopener noreferrer">View Original Feed</a>
                `;
            }
        }

        // ===== ЗАГРУЗКА =====
        const savedLang = localStorage.getItem('blogLang');
        if (savedLang && translations[savedLang]) {
            currentLang = savedLang;
        } else {
            const browserLang = navigator.language?.split('-')[0] || 'en';
            if (translations[browserLang]) {
                currentLang = browserLang;
            }
        }

        setLanguage(currentLang);
        loadArticle();
    </script>
</body>
</html>
