<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Loading Article... | Internationals.pro</title>
    <meta id="meta-desc" name="description" content="">
    <meta id="meta-keys" name="keywords" content="">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }

        .close-btn {
            position: fixed;
            top: 15px;
            right: 20px;
            background: transparent;
            border: none;
            color: #d9534f;
            font-size: 52px;
            cursor: pointer;
            z-index: 9999;
            transition: all 0.2s ease;
            padding: 0 8px;
            line-height: 1;
        }

        .close-btn:hover {
            color: #ff0000;
            transform: scale(1.1);
        }

        .globe {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 68px;
            height: 68px;
            cursor: pointer;
            z-index: 9999;
            transition: all 0.3s ease;
            border: none;
            background: transparent;
            padding: 0;
            animation: spin 10s linear infinite;
        }

        .globe img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .globe:hover {
            transform: scale(1.1);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .date {
            color: #666;
            font-size: 0.9em;
            margin: -10px 0 20px 0;
        }

        .source {
            margin-top: 40px;
            font-size: 0.9em;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .main-img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 25px;
            background-color: #f0f0f0;
        }

        .goog-te-banner-frame {
            display: none !important;
        }
        body { top: 0 !important; }
        .skiptranslate iframe { display: none !important; }
        .skiptranslate { display: none !important; }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 99999;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            text-align: center;
            max-width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <button class="close-btn" onclick="closeTab()">←</button>

    <button class="globe" id="globeBtn" title="Translate to your language">
        <img src="assets/globe.png" alt="Translate">
    </button>

    <div id="toast">Loading...</div>

    <h1 id="article-title">Loading...</h1>
    <div id="article-date" class="date"></div>
    <div id="article-image-wrapper"></div>
    <div id="article-body"></div>
    <p id="article-source" class="source"></p>

    <script>
        function closeTab() { window.close(); }

        const globeBtn = document.getElementById('globeBtn');
        const toast = document.getElementById('toast');

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        globeBtn.addEventListener('click', function() {
            const userLang = navigator.language || navigator.userLanguage;
            const langCode = userLang.split('-')[0];

            if (langCode === 'en') {
                showToast('🌐 Your browser language is English.');
                return;
            }

            const url = new URL(window.location.href);
            const currentLang = url.searchParams.get('lang');

            if (currentLang === langCode) {
                showToast('✅ Already translated to ' + getLangName(langCode));
                return;
            }

            localStorage.setItem('translateLang', langCode);
            url.searchParams.set('lang', langCode);
            window.location.href = url.toString();
        });

        function getLangName(lang) {
            const names = {
                'en': 'English', 'ru': 'Русский', 'de': 'Deutsch',
                'es': 'Español', 'pt': 'Português', 'zh': '中文',
                'ar': 'العربية', 'fr': 'Français', 'it': 'Italiano',
                'ja': '日本語', 'ko': '한국어', 'tr': 'Türkçe'
            };
            return names[lang] || lang;
        }

        function autoTranslate() {
            const urlParams = new URLSearchParams(window.location.search);
            const lang = urlParams.get('lang');

            if (!lang || lang === 'en') return;

            setTimeout(function() {
                const select = document.querySelector('.goog-te-combo');
                if (select) {
                    select.value = lang;
                    select.dispatchEvent(new Event('change'));
                    showToast('✅ Translated to ' + getLangName(lang));
                } else {
                    setTimeout(function() {
                        const select2 = document.querySelector('.goog-te-combo');
                        if (select2) {
                            select2.value = lang;
                            select2.dispatchEvent(new Event('change'));
                            showToast('✅ Translated to ' + getLangName(lang));
                        }
                    }, 2000);
                }
            }, 1500);
        }

        function loadGoogleTranslate() {
            if (typeof google !== 'undefined' && google.translate) {
                autoTranslate();
                return;
            }

            const script = document.createElement('script');
            script.src = 'https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
            script.async = true;
            document.head.appendChild(script);

            window.googleTranslateElementInit = function() {
                new google.translate.TranslateElement({
                    pageLanguage: 'en',
                    includedLanguages: 'en,ru,de,es,pt,zh,ar,fr,it,ja,ko,tr',
                    layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                    autoDisplay: false
                }, 'google_translate_element');

                autoTranslate();
            };

            if (!document.getElementById('google_translate_element')) {
                const container = document.createElement('div');
                container.id = 'google_translate_element';
                container.style.display = 'none';
                document.body.appendChild(container);
            }
        }

        function getCurrentLang() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('lang') || 'en';
        }

        const SUPABASE_URL = "https://mcgcijdnzduzyqbbjtkm.supabase.co";
        const SUPABASE_KEY = "sb_publishable_CCc78qZY25XBUDqdYsX9_w_YyKTihee";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadArticle() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');

            if (!slug) {
                document.getElementById('article-title').innerText = "Article not found";
                return;
            }

            const { data: article, error } = await _supabase
                .from('articles')
                .select('*')
                .eq('slug', slug)
                .single();

            if (error || !article) {
                document.getElementById('article-title').innerText = "Article not found";
                return;
            }

            document.title = `${article.title} | Internationals.pro`;
            document.getElementById('meta-desc').setAttribute('content', article.meta_description || '');
            document.getElementById('meta-keys').setAttribute('content', article.keywords || '');

            document.getElementById('article-title').innerText = article.title;
            document.getElementById('article-date').innerText = new Date(article.created_at).toLocaleDateString('en-US', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });

            if (article.image_url) {
                document.getElementById('article-image-wrapper').innerHTML = `
                    <img src="${article.image_url}" class="main-img" alt="${article.title}">
                `;
            }

            document.getElementById('article-body').innerText = article.summary;

            if (article.source_url) {
                document.getElementById('article-source').innerHTML = `
                    Original source: <a href="${article.source_url}" target="_blank" rel="noopener noreferrer">View Original Feed</a>
                `;
            }

            loadGoogleTranslate();
        }

        loadArticle();
    </script>
</body>
</html>
