<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Loading... | Internationals.pro</title>
    <meta id="meta-desc" name="description" content="">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.8; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #222; }
        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; margin-bottom: 28px; }
        .top-nav a { color: #0066cc; text-decoration: none; font-size: 15px; font-weight: 500; }
        .top-nav a:hover { text-decoration: underline; }
        .close-btn { background: transparent; border: none; color: #d9534f; font-size: 42px; cursor: pointer; padding: 0; line-height: 1; }
        h1 { font-size: 1.9em; line-height: 1.3; margin-bottom: 8px; color: #111; }
        .meta { color: #888; font-size: 13px; margin-bottom: 24px; }
        .news-img { width: 100%; max-height: 420px; object-fit: cover; border-radius: 10px; margin-bottom: 28px; }
        .article-body { font-size: 1.08em; color: #333; }
        .source-link { display: inline-block; margin-top: 32px; padding: 10px 20px; background: #f4f4f4; border-radius: 8px; color: #555; text-decoration: none; font-size: 14px; }
        .source-link:hover { background: #e8e8e8; }
        .cta { margin-top: 40px; padding: 20px 24px; background: #f0f7ff; border-radius: 10px; border-left: 4px solid #0066cc; }
        .cta a { color: #0066cc; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="index.html">← Internationals.pro</a>
        <button class="close-btn" onclick="window.close()">×</button>
    </nav>

    <div id="content">
        <p style="text-align:center;color:#888;padding:60px 0;">Loading...</p>
    </div>

    <script>
        var lang = (navigator.language || 'en').split('-')[0];
        var useRu = (lang === 'ru');
        var slug = new URLSearchParams(location.search).get('slug');

        if (!slug) {
            document.getElementById('content').innerHTML = '<p><a href="blog.html">← Back to news</a></p>';
        } else {
            fetch('news.json?v=' + Date.now())
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var art = (data.articles || []).find(function(a) { return a.slug === slug; });
                    if (!art) {
                        document.getElementById('content').innerHTML = '<p>Article not found. <a href="blog.html">← Back</a></p>';
                        return;
                    }

                    var title = useRu ? (art.title_ru || art.title_en || '') : (art.title_en || art.title_ru || '');
                    var full = useRu ? (art.full_ru || art.full_en || '') : (art.full_en || art.full_ru || '');
                    var meta = useRu ? (art.meta_ru || art.meta_en || '') : (art.meta_en || art.meta_ru || '');
                    var date = art.created_at ? new Date(art.created_at).toLocaleDateString(useRu ? 'ru-RU' : 'en-US', {day:'numeric',month:'long',year:'numeric'}) : '';
                    var backText = useRu ? '← К новостям' : '← Back to news';
                    var ctaText = useRu ? 'Нужен перевод документов, виза или сопровождение за рубежом? <a href="index.html#contact">Свяжитесь с Internationals →</a>' : 'Need document translation, visa support or localization? <a href="index.html#contact">Contact Internationals →</a>';
                    var sourceText = useRu ? '📰 Читать оригинал' : '📰 Read original';

                    document.title = title + ' | Internationals.pro';
                    document.getElementById('meta-desc').content = meta;

                    document.getElementById('content').innerHTML =
                        '<a href="blog.html" style="display:inline-block;margin-bottom:24px;color:#0066cc;text-decoration:none;">' + backText + '</a>' +
                        '<h1>' + title + '</h1>' +
                        '<div class="meta">' + date + (art.source_name ? ' · ' + art.source_name : '') + '</div>' +
                        (art.image_url ? '<img src="' + art.image_url + '" class="news-img" onerror="this.style.display=\'none\'">' : '') +
                        '<div class="article-body">' + full + '</div>' +
                        (art.source_url ? '<a href="' + art.source_url + '" target="_blank" class="source-link">' + sourceText + '</a>' : '') +
                        '<div class="cta">' + ctaText + '</div>';
                })
                .catch(function() {
                    document.getElementById('content').innerHTML = '<p>Error loading. <a href="blog.html">← Back</a></p>';
                });
        }
    </script>
</body>
</html>
