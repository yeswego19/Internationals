<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Загрузка... | Internationals.pro</title>
    <meta id="meta-desc" name="description" content="">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.8; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #222; }
        .close-btn { position: fixed; top: 15px; right: 20px; background: transparent; border: none; color: #d9534f; font-size: 52px; cursor: pointer; z-index: 9999; padding: 0 8px; line-height: 1; }
        .close-btn:hover { color: #ff0000; transform: scale(1.1); }
        .back { display: inline-block; margin-bottom: 24px; color: #0066cc; text-decoration: none; font-size: 15px; }
        .back:hover { text-decoration: underline; }
        h1 { font-size: 1.9em; line-height: 1.3; margin-bottom: 8px; color: #111; }
        .meta { color: #888; font-size: 13px; margin-bottom: 24px; }
        .news-img { width: 100%; max-height: 420px; object-fit: cover; border-radius: 10px; margin-bottom: 28px; }
        .article-body { font-size: 1.08em; color: #333; }
        .source-link { display: inline-block; margin-top: 32px; padding: 10px 20px; background: #f4f4f4; border-radius: 8px; color: #555; text-decoration: none; font-size: 14px; }
        .source-link:hover { background: #e8e8e8; }
        .cta { margin-top: 40px; padding: 20px 24px; background: #f0f7ff; border-radius: 10px; border-left: 4px solid #0066cc; }
        .cta a { color: #0066cc; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <button class="close-btn" onclick="window.close()">←</button>

    <div id="content">
        <p style="text-align:center;color:#888;padding:60px 0;">Загрузка статьи...</p>
    </div>

    <script>
        var slug = new URLSearchParams(location.search).get('slug');

        if (!slug) {
            document.getElementById('content').innerHTML = '<p>Статья не найдена. <a href="blog.html">← Назад</a></p>';
        } else {
            fetch('news.json?v=' + Date.now())
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var art = (data.articles || []).find(function(a) { return a.slug === slug; });
                    if (!art) {
                        document.getElementById('content').innerHTML = '<p>Статья не найдена. <a href="blog.html">← К новостям</a></p>';
                        return;
                    }

                    document.title = art.title + ' | Internationals.pro';
                    document.getElementById('meta-desc').content = art.meta_description || '';

                    var date = art.created_at ? new Date(art.created_at).toLocaleDateString('ru-RU', {day:'numeric',month:'long',year:'numeric'}) : '';

                    document.getElementById('content').innerHTML =
                        '<a class="back" href="blog.html">← К новостям</a>' +
                        '<h1>' + art.title + '</h1>' +
                        '<div class="meta">' + date + (art.source_name ? ' · ' + art.source_name : '') + '</div>' +
                        (art.image_url ? '<img src="' + art.image_url + '" class="news-img" onerror="this.style.display=\'none\'">' : '') +
                        '<div class="article-body">' + (art.full_text || art.preview || '') + '</div>' +
                        (art.source_url ? '<a href="' + art.source_url + '" target="_blank" class="source-link">📰 Читать оригинал</a>' : '') +
                        '<div class="cta">Нужен перевод документов, виза или сопровождение за рубежом? <a href="index.html#contact">Свяжитесь с Internationals →</a></div>';
                })
                .catch(function() {
                    document.getElementById('content').innerHTML = '<p>Ошибка загрузки. <a href="blog.html">← Назад</a></p>';
                });
        }
    </script>
</body>
</html>
