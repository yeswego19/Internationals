<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>INTERNATIONALS TV</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

:root{
  --bg:#04090f;
  --surface:#0a1525;
  --border:rgba(0,160,255,.18);
  --accent:#0099ff;
  --accent2:#00d4ff;
  --text:#e8f4ff;
  --muted:rgba(232,244,255,.45);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'IBM Plex Mono',monospace;
  overflow:hidden;
}

/* GRID */

body::before{

  content:'';

  position:fixed;
  inset:0;

  background-image:
  linear-gradient(rgba(0,153,255,.04) 1px, transparent 1px),
  linear-gradient(90deg, rgba(0,153,255,.04) 1px, transparent 1px);

  background-size:40px 40px;

  pointer-events:none;

}

/* HEADER */

.header{

  position:fixed;
  top:0;
  left:0;
  right:0;

  height:60px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 28px;

  background:rgba(4,9,15,.88);

  backdrop-filter:blur(16px);

  border-bottom:1px solid var(--border);

  z-index:999;

}

.logo{

  font-family:'Rajdhani',sans-serif;
  font-size:22px;
  font-weight:700;

  letter-spacing:3px;

  color:var(--accent2);

}

.logo span{

  color:var(--muted);
  font-weight:400;

}

.live{

  display:flex;
  align-items:center;
  gap:8px;

  font-size:12px;

  letter-spacing:2px;

  color:var(--accent);

}

.dot{

  width:8px;
  height:8px;

  border-radius:50%;

  background:#ff3a3a;

  box-shadow:0 0 10px #ff3a3a;

  animation:pulse 1.2s infinite;

}

@keyframes pulse{

  0%,100%{
    opacity:1;
    transform:scale(1);
  }

  50%{
    opacity:.4;
    transform:scale(.7);
  }

}

/* MAIN */

.main{

  display:grid;

  grid-template-columns:280px 1fr;

  height:100vh;

  padding-top:60px;

}

/* SIDEBAR */

.sidebar{

  background:rgba(10,21,37,.7);

  border-right:1px solid var(--border);

  overflow-y:auto;

}

.sidebar-title{

  padding:20px;

  font-size:11px;

  letter-spacing:3px;

  color:var(--muted);

  border-bottom:1px solid var(--border);

}

.channel{

  display:flex;
  align-items:center;

  gap:14px;

  padding:14px 18px;

  cursor:pointer;

  transition:.2s;

  border-left:3px solid transparent;

}

.channel:hover{

  background:rgba(0,153,255,.08);

}

.channel.active{

  background:rgba(0,153,255,.14);

  border-left-color:var(--accent);

}

.icon{

  width:42px;
  height:42px;

  border-radius:10px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:var(--surface);

  border:1px solid var(--border);

  font-size:18px;

}

.info{

  flex:1;

}

.name{

  font-family:'Rajdhani',sans-serif;
  font-size:16px;
  font-weight:700;

}

.tag{

  margin-top:3px;

  font-size:10px;

  color:var(--muted);

  letter-spacing:1px;

}

/* PLAYER */

.player{

  display:flex;
  flex-direction:column;

  background:black;

}

.video-wrap{

  flex:1;

  position:relative;

  background:black;

}

video{

  width:100%;
  height:100%;

  object-fit:contain;

  background:black;

}

.status{

  height:44px;

  display:flex;
  align-items:center;

  padding:0 20px;

  border-top:1px solid var(--border);

  background:rgba(4,9,15,.95);

  font-size:12px;

  color:var(--muted);

}

.now{

  font-family:'Rajdhani',sans-serif;
  font-size:15px;
  font-weight:700;

  color:var(--text);

}

/* LOADER */

.loader{

  position:absolute;
  inset:0;

  display:flex;
  align-items:center;
  justify-content:center;

  pointer-events:none;

}

.spinner{

  width:50px;
  height:50px;

  border:3px solid rgba(255,255,255,.1);
  border-top-color:var(--accent);

  border-radius:50%;

  animation:spin .8s linear infinite;

  display:none;

}

.spinner.active{

  display:block;

}

@keyframes spin{

  to{
    transform:rotate(360deg);
  }

}

/* ERROR */

.error{

  position:absolute;
  inset:0;

  display:none;
  flex-direction:column;

  align-items:center;
  justify-content:center;

  background:rgba(4,9,15,.9);

  gap:14px;

  z-index:5;

}

.error.show{

  display:flex;

}

.error-icon{

  font-size:50px;

}

.error-text{

  font-family:'Rajdhani',sans-serif;

  font-size:18px;

  color:var(--muted);

  text-align:center;

}

/* MOBILE */

@media(max-width:700px){

  .main{

    grid-template-columns:1fr;
    grid-template-rows:1fr 200px;

  }

  .sidebar{

    border-right:none;
    border-top:1px solid var(--border);

  }

}

</style>
</head>

<body>

<header class="header">

  <div class="logo">
    INTERNATIONALS<span>.TV</span>
  </div>

  <div class="live">

    <div class="dot"></div>

    LIVE

  </div>

</header>

<div class="main">

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="sidebar-title">
      CHANNELS
    </div>

    <div id="channels"></div>

  </aside>

  <!-- PLAYER -->

  <div class="player">

    <div class="video-wrap">

      <video
        id="video"
        autoplay
        muted
        playsinline
        controls>
      </video>

      <div class="loader">
        <div class="spinner" id="spinner"></div>
      </div>

      <div class="error" id="error">

        <div class="error-icon">
          📡
        </div>

        <div class="error-text">
          Stream unavailable
        </div>

      </div>

    </div>

    <div class="status">

      <div class="now" id="now">
        Loading...
      </div>

    </div>

  </div>

</div>

<script>

/* CHANNELS */

const CHANNELS = [

  {
    name:"Big Buck Bunny",
    tag:"MOVIE • STABLE",
    icon:"🐰",
    url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
  },

  {
    name:"Sintel",
    tag:"ANIMATION FILM",
    icon:"🎞️",
    url:"https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8"
  },

  {
    name:"Tears of Steel",
    tag:"SCI-FI SHORT FILM",
    icon:"🚀",
    url:"https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/hls/tears-of-steel.m3u8"
  },

  {
    name:"Tokyo Live",
    tag:"LIVE CAMERA",
    icon:"🗼",
    url:"https://cph-p2p-msl.akamaized.net/hls/live/2000341/test/master.m3u8"
  },

  {
    name:"Relax FM",
    tag:"RADIO",
    icon:"🎵",
    url:"https://pub0302.101.ru:8443/stream/trust/mp3/128/200"
  }

];

/* ELEMENTS */

const video =
document.getElementById('video');

const channels =
document.getElementById('channels');

const spinner =
document.getElementById('spinner');

const error =
document.getElementById('error');

const now =
document.getElementById('now');

let hls = null;

/* BUILD */

CHANNELS.forEach((ch,index)=>{

  const div =
  document.createElement('div');

  div.className =
  'channel';

  div.innerHTML = `
  
    <div class="icon">${ch.icon}</div>

    <div class="info">

      <div class="name">${ch.name}</div>

      <div class="tag">${ch.tag}</div>

    </div>

  `;

  div.onclick = ()=>{

    document
    .querySelectorAll('.channel')
    .forEach(el=>el.classList.remove('active'));

    div.classList.add('active');

    play(ch);

  };

  channels.appendChild(div);

});

/* PLAY */

function play(channel){

  now.textContent =
  channel.name;

  error.classList.remove('show');

  spinner.classList.add('active');

  if(hls){

    hls.destroy();

    hls = null;

  }

  // RADIO

  if(
    channel.url.includes('.mp3')
  ){

    video.src =
    channel.url;

    video.onloadedmetadata = ()=>{

      spinner.classList.remove('active');

      video.play();

    };

    video.onerror = ()=>{

      spinner.classList.remove('active');

      error.classList.add('show');

    };

    return;

  }

  // HLS

  if(Hls.isSupported()){

    hls = new Hls({

      enableWorker:true,
      lowLatencyMode:true

    });

    hls.loadSource(channel.url);

    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED,()=>{

      spinner.classList.remove('active');

      video.play().catch(()=>{});

    });

    hls.on(Hls.Events.ERROR,(e,data)=>{

      if(data.fatal){

        spinner.classList.remove('active');

        error.classList.add('show');

      }

    });

  }

  // SAFARI

  else if(
    video.canPlayType(
      'application/vnd.apple.mpegurl'
    )
  ){

    video.src =
    channel.url;

    video.onloadedmetadata = ()=>{

      spinner.classList.remove('active');

      video.play();

    };

  }

}

/* AUTOSTART */

setTimeout(()=>{

  document
  .querySelector('.channel')
  .click();

},400);

</script>

</body>
</html>
