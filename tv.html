<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>INTERNATIONALS TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

width:100%;
height:100%;

background:#050b14;

font-family:Arial,sans-serif;

overflow:hidden;

color:white;

}

/* HEADER */

.header{

position:fixed;

top:0;
left:0;
right:0;

height:58px;

background:rgba(0,0,0,.7);

backdrop-filter:blur(12px);

display:flex;
align-items:center;
justify-content:space-between;

padding:0 24px;

border-bottom:1px solid rgba(0,170,255,.2);

z-index:999;

}

.logo{

font-size:22px;
font-weight:bold;

letter-spacing:3px;

color:#00cfff;

}

.live{

font-size:12px;

letter-spacing:2px;

color:#00cfff;

}

/* LAYOUT */

.main{

display:grid;

grid-template-columns:260px 1fr;

height:100vh;

padding-top:58px;

}

/* SIDEBAR */

.sidebar{

background:#08111d;

border-right:1px solid rgba(0,170,255,.15);

padding:14px;

overflow-y:auto;

}

.channel{

background:#0d1725;

border:1px solid rgba(0,170,255,.15);

border-radius:14px;

padding:14px;

margin-bottom:10px;

cursor:pointer;

transition:.2s;

}

.channel:hover{

background:#102033;

border-color:#00aaff;

}

.channel.active{

background:#12304d;

border-color:#00cfff;

}

.name{

font-size:16px;
font-weight:bold;

margin-bottom:4px;

}

.tag{

font-size:11px;

opacity:.6;

letter-spacing:1px;

}

/* PLAYER */

.player{

position:relative;

background:black;

}

video{

width:100%;
height:100%;

object-fit:contain;

background:black;

}

/* STATUS */

.status{

position:absolute;

left:20px;
bottom:20px;

background:rgba(0,0,0,.6);

backdrop-filter:blur(10px);

padding:10px 16px;

border-radius:12px;

font-size:14px;

z-index:20;

}

/* ERROR */

.error{

position:absolute;

inset:0;

display:none;

align-items:center;
justify-content:center;

background:rgba(0,0,0,.7);

font-size:20px;

z-index:50;

}

.error.show{

display:flex;

}

/* MOBILE */

@media(max-width:700px){

.main{

grid-template-columns:1fr;
grid-template-rows:1fr 180px;

}

.sidebar{

border-right:none;
border-top:1px solid rgba(0,170,255,.15);

}

}

</style>

</head>

<body>

<div class="header">

<div class="logo">
INTERNATIONALS.TV
</div>

<div class="live">
LIVE
</div>

</div>

<div class="main">

<!-- SIDEBAR -->

<div class="sidebar" id="channels"></div>

<!-- PLAYER -->

<div class="player">

<video
id="video"
autoplay
muted
playsinline
controls>
</video>

<div class="status" id="status">
Loading...
</div>

<div class="error" id="error">
STREAM UNAVAILABLE
</div>

</div>

</div>

<script>

/* CHANNELS */

const CHANNELS = [

{
name:"🎬 Short Film",
tag:"24/7 MOVIE STREAM",
type:"hls",
url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
},

{
name:"🌊 Ambient Radio",
tag:"RELAX • AMBIENT",
type:"audio",
url:"https://streams.ilovemusic.de/iloveradio2.mp3"
}

];

const video =
document.getElementById('video');

const channels =
document.getElementById('channels');

const status =
document.getElementById('status');

const error =
document.getElementById('error');

let hls = null;

/* BUILD CHANNELS */

CHANNELS.forEach((channel,index)=>{

const div =
document.createElement('div');

div.className =
'channel';

div.innerHTML = `

<div class="name">
${channel.name}
</div>

<div class="tag">
${channel.tag}
</div>

`;

div.onclick = ()=>{

document
.querySelectorAll('.channel')
.forEach(el=>el.classList.remove('active'));

div.classList.add('active');

play(channel);

};

channels.appendChild(div);

});

/* PLAY */

function play(channel){

error.classList.remove('show');

status.innerText =
channel.name;

if(hls){

hls.destroy();

hls = null;

}

/* AUDIO */

if(channel.type === 'audio'){

video.src =
channel.url;

video.play()
.catch(()=>{

error.classList.add('show');

});

return;

}

/* HLS */

if(Hls.isSupported()){

hls = new Hls();

hls.loadSource(channel.url);

hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{

video.play()
.catch(()=>{});

});

hls.on(Hls.Events.ERROR,(e,data)=>{

if(data.fatal){

error.classList.add('show');

}

});

}

/* SAFARI */

else if(
video.canPlayType(
'application/vnd.apple.mpegurl'
)
){

video.src =
channel.url;

video.play()
.catch(()=>{

error.classList.add('show');

});

}

}

/* AUTOSTART */

setTimeout(()=>{

document
.querySelector('.channel')
.click();

},500);

</script>

</body>
</html>
