<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTERNATIONALS TV</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

:root{
  --bg:#04090f;
  --surface:#0a1525;
  --border:rgba(0,160,255,.18);
  --accent:#0099ff;
  --accent2:#00d4ff;
  --text:#e8f4ff;
  --muted:rgba(232,244,255,.45);
  --glow:0 0 24px rgba(0,153,255,.35);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'IBM Plex Mono',monospace;
  overflow:hidden;
}

/* BACKGROUND */

body::before{
  content:'';
  position:fixed;
  inset:0;

  background-image:
  linear-gradient(rgba(0,153,255,.04) 1px, transparent 1px),
  linear-gradient(90deg, rgba(0,153,255,.04) 1px, transparent 1px);

  background-size:40px 40px;

  pointer-events:none;
}

/* HEADER */

.header{
  position:fixed;
  top:0;
  left:0;
  right:0;

  height:60px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 28px;

  background:rgba(4,9,15,.88);

  backdrop-filter:blur(16px);

  border-bottom:1px solid var(--border);

  z-index:500;
}

.logo{
  font-family:'Rajdhani',sans-serif;
  font-size:22px;
  font-weight:700;
  letter-spacing:3px;

  color:var(--accent2);

  text-shadow:var(--glow);
}

.logo span{
  color:var(--muted);
  font-weight:400;
}

.live-badge{
  display:flex;
  align-items:center;
  gap:8px;

  font-size:12px;
  letter-spacing:2px;

  color:var(--accent);
}

.live-dot{
  width:8px;
  height:8px;

  border-radius:50%;

  background:#ff3a3a;

  box-shadow:0 0 8px #ff3a3a;

  animation:pulse 1.3s infinite;
}

@keyframes pulse{

  0%,100%{
    transform:scale(1);
    opacity:1;
  }

  50%{
    transform:scale(.7);
    opacity:.5;
  }

}

/* MAIN */

.main{
  display:grid;
  grid-template-columns:280px 1fr;

  height:100vh;

  padding-top:60px;
}

/* SIDEBAR */

.sidebar{
  background:rgba(10,21,37,.7);

  border-right:1px solid var(--border);

  display:flex;
  flex-direction:column;

  overflow:hidden;
}

.sidebar-title{
  padding:20px;

  font-size:11px;
  letter-spacing:3px;

  color:var(--muted);

  border-bottom:1px solid var(--border);
}

.channel-list{
  flex:1;

  overflow-y:auto;

  padding:10px 0;
}

.channel-item{
  display:flex;
  align-items:center;

  gap:14px;

  padding:12px 20px;

  cursor:pointer;

  transition:.2s;

  border-left:3px solid transparent;
}

.channel-item:hover{
  background:rgba(0,153,255,.07);
}

.channel-item.active{
  background:rgba(0,153,255,.13);
  border-left-color:var(--accent);
}

.ch-icon{
  width:40px;
  height:40px;

  border-radius:10px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:var(--surface);

  border:1px solid var(--border);

  font-size:18px;
}

.ch-info{
  flex:1;
}

.ch-name{
  font-family:'Rajdhani',sans-serif;
  font-size:15px;
  font-weight:700;
}

.ch-tag{
  margin-top:3px;

  font-size:10px;

  color:var(--muted);

  letter-spacing:1px;
}

/* PLAYER */

.player-wrap{
  display:flex;
  flex-direction:column;

  background:black;
}

.video-container{
  flex:1;

  position:relative;

  background:black;
}

video{
  width:100%;
  height:100%;

  object-fit:contain;

  background:black;
}

/* SPINNER */

.overlay{
  position:absolute;
  inset:0;

  display:flex;
  align-items:center;
  justify-content:center;

  pointer-events:none;
}

.spinner{
  width:48px;
  height:48px;

  border:3px solid rgba(0,153,255,.2);
  border-top-color:var(--accent);

  border-radius:50%;

  animation:spin .8s linear infinite;

  display:none;
}

.spinner.active{
  display:block;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

/* STATUS BAR */

.status-bar{
  height:46px;

  display:flex;
  align-items:center;

  gap:20px;

  padding:0 20px;

  background:rgba(4,9,15,.95);

  border-top:1px solid var(--border);

  font-size:11px;

  letter-spacing:1px;

  color:var(--muted);
}

.now-playing{
  flex:1;

  font-family:'Rajdhani',sans-serif;
  font-size:15px;
  font-weight:700;

  color:var(--text);
}

.stream-quality{
  color:var(--accent);
}

/* ERROR */

.error-msg{
  position:absolute;
  inset:0;

  display:none;
  flex-direction:column;

  align-items:center;
  justify-content:center;

  gap:12px;

  background:rgba(4,9,15,.92);

  z-index:20;
}

.error-msg.show{
  display:flex;
}

.error-icon{
  font-size:46px;
}

.error-text{
  text-align:center;

  max-width:340px;

  line-height:1.5;

  color:var(--muted);

  font-family:'Rajdhani',sans-serif;
}

/* MOBILE */

@media(max-width:700px){

  .main{
    grid-template-columns:1fr;
    grid-template-rows:1fr 190px;
  }

  .sidebar{
    border-right:none;
    border-top:1px solid var(--border);
  }

  .channel-list{
    display:flex;
    overflow-x:auto;
    overflow-y:hidden;

    padding:10px;

    gap:8px;
  }

  .channel-item{
    min-width:90px;

    flex-direction:column;

    text-align:center;

    border-left:none;

    border-bottom:3px solid transparent;

    border-radius:10px;
  }

  .channel-item.active{
    border-bottom-color:var(--accent);
  }

}

</style>
</head>

<body>

<header class="header">

  <div class="logo">
    INTERNATIONALS<span>.TV</span>
  </div>

  <div class="live-badge">
    <div class="live-dot"></div>
    LIVE
  </div>

</header>

<div class="main">

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="sidebar-title">
      CHANNELS
    </div>

    <div class="channel-list" id="channelList"></div>

  </aside>

  <!-- PLAYER -->

  <div class="player-wrap">

    <div class="video-container">

      <video
        id="video"
        autoplay
        muted
        playsinline
        controls>
      </video>

      <div class="overlay">
        <div class="spinner" id="spinner"></div>
      </div>

      <div class="error-msg" id="errorMsg">

        <div class="error-icon">
          📡
        </div>

        <div class="error-text">
          Канал временно недоступен.<br>
          Попробуй другой поток.
        </div>

      </div>

    </div>

    <div class="status-bar">

      <div class="now-playing" id="nowPlaying">
        Loading...
      </div>

      <div class="stream-quality" id="streamQuality">
        HLS
      </div>

    </div>

  </div>

</div>

<script>

/* CHANNELS */

const CHANNELS = [

  {
    name:"ARTE Live",
    tag:"EUROPE • CULTURE",
    icon:"🎬",
    url:"https://artesimulcast.akamaized.net/hls/live/2031003/artelive_fr/index.m3u8"
  },

  {
    name:"Travel XP",
    tag:"WORLD • TRAVEL",
    icon:"✈️",
    url:"https://d18dyiwu97wm6q.cloudfront.net/playlist2160p.m3u8"
  },

  {
    name:"Bloomberg TV",
    tag:"BUSINESS • LIVE",
    icon:"💹",
    url:"https://bloomberg-bloomberg-1-eu.rakuten.wurl.tv/playlist.m3u8"
  },

  {
    name:"Short Films",
    tag:"CINEMA • SHORTS",
    icon:"🎞️",
    url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
  },

  {
    name:"Relax FM",
    tag:"RADIO • CHILL",
    icon:"🎵",
    url:"https://pub0302.101.ru:8443/stream/trust/mp3/128/200"
  }

];

/* PLAYER */

const video =
document.getElementById('video');

const spinner =
document.getElementById('spinner');

const errorMsg =
document.getElementById('errorMsg');

const nowPlaying =
document.getElementById('nowPlaying');

const streamQuality =
document.getElementById('streamQuality');

let hls = null;

/* BUILD CHANNELS */

function buildChannels(){

  const list =
  document.getElementById('channelList');

  CHANNELS.forEach((ch,index)=>{

    const item =
    document.createElement('div');

    item.className =
    'channel-item';

    item.innerHTML = `
      <div class="ch-icon">${ch.icon}</div>

      <div class="ch-info">
        <div class="ch-name">${ch.name}</div>
        <div class="ch-tag">${ch.tag}</div>
      </div>
    `;

    item.onclick = ()=>{

      document
      .querySelectorAll('.channel-item')
      .forEach(el=>el.classList.remove('active'));

      item.classList.add('active');

      playStream(ch);

    };

    list.appendChild(item);

  });

}

/* PLAY STREAM */

function playStream(channel){

  nowPlaying.textContent =
  channel.name;

  spinner.classList.add('active');

  errorMsg.classList.remove('show');

  if(hls){

    hls.destroy();

  }

  if(Hls.isSupported()){

    hls = new Hls({

      enableWorker:true,
      lowLatencyMode:true

    });

    hls.loadSource(channel.url);

    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED,()=>{

      spinner.classList.remove('active');

      video.play().catch(()=>{});

    });

    hls.on(Hls.Events.ERROR,(e,data)=>{

      if(data.fatal){

        spinner.classList.remove('active');

        errorMsg.classList.add('show');

      }

    });

  }

  else if(
    video.canPlayType(
      'application/vnd.apple.mpegurl'
    )
  ){

    video.src =
    channel.url;

    video.addEventListener(
      'loadedmetadata',
      ()=>{

        spinner.classList.remove('active');

        video.play();

      },
      { once:true }
    );

  }

}

/* INIT */

buildChannels();

setTimeout(()=>{

  document
  .querySelector('.channel-item')
  .click();

},400);

</script>

</body>
</html>
