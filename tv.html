<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTERNATIONALS TV</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
:root {
  --bg:        #04090f;
  --surface:   #0a1525;
  --border:    rgba(0,160,255,0.18);
  --accent:    #0099ff;
  --accent2:   #00d4ff;
  --text:      #e8f4ff;
  --muted:     rgba(232,244,255,0.45);
  --glow:      0 0 24px rgba(0,153,255,0.35);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  overflow-x: hidden;
}

/* ── BACKGROUND GRID ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,153,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,153,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  background: rgba(4,9,15,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  z-index: 500;
}

.logo {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 22px;
  letter-spacing: 3px;
  color: var(--accent2);
  text-shadow: var(--glow);
}

.logo span { color: var(--muted); font-weight: 400; }

.live-badge {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--accent);
}

.live-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #ff3a3a;
  box-shadow: 0 0 8px #ff3a3a;
  animation: pulse 1.4s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(0.8); }
}

/* ── MAIN LAYOUT ── */
.main {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: 100vh;
  padding-top: 60px;
  position: relative;
  z-index: 1;
}

/* ── CHANNEL SIDEBAR ── */
.sidebar {
  background: rgba(10,21,37,0.7);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-title {
  padding: 20px 20px 12px;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
}

.channel-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.channel-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 20px;
  cursor: pointer;
  transition: background 0.2s, border-left 0.2s;
  border-left: 3px solid transparent;
  user-select: none;
}

.channel-item:hover {
  background: rgba(0,153,255,0.07);
}

.channel-item.active {
  background: rgba(0,153,255,0.12);
  border-left-color: var(--accent);
}

.ch-icon {
  width: 38px; height: 38px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.ch-info { flex: 1; min-width: 0; }

.ch-name {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 15px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.ch-tag {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 2px;
}

/* custom stream input at bottom */
.custom-input-wrap {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
}

.custom-input-wrap label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  display: block;
  margin-bottom: 6px;
}

.custom-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  outline: none;
  transition: border-color 0.2s;
}

.custom-input:focus { border-color: var(--accent); }

.custom-btn {
  margin-top: 7px;
  width: 100%;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 6px;
  padding: 8px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: background 0.2s;
}

.custom-btn:hover { background: var(--accent2); }

/* ── PLAYER AREA ── */
.player-wrap {
  display: flex;
  flex-direction: column;
  background: #000;
  position: relative;
}

.video-container {
  flex: 1;
  position: relative;
  background: #000;
  overflow: hidden;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

/* overlay controls */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 5;
}

.spinner {
  width: 48px; height: 48px;
  border: 3px solid rgba(0,153,255,0.2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: none;
}

@keyframes spin { to { transform: rotate(360deg); } }

.spinner.active { display: block; }

/* status bar */
.status-bar {
  height: 44px;
  background: rgba(4,9,15,0.9);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
}

.now-playing {
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
}

.stream-quality {
  color: var(--accent);
}

/* error message */
.error-msg {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: rgba(4,9,15,0.9);
  z-index: 10;
}

.error-msg.show { display: flex; }

.error-icon { font-size: 48px; }

.error-text {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  color: var(--muted);
  text-align: center;
  max-width: 340px;
  line-height: 1.5;
}

/* ── MOBILE ── */
@media (max-width: 700px) {
  .main {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr auto;
  }

  .player-wrap { order: 1; }

  .sidebar {
    order: 2;
    height: 200px;
    border-right: none;
    border-top: 1px solid var(--border);
  }

  .channel-list {
    display: flex;
    flex-direction: row;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 10px;
    gap: 8px;
  }

  .channel-item {
    flex-direction: column;
    min-width: 80px;
    padding: 10px 8px;
    border-left: none;
    border-bottom: 3px solid transparent;
    text-align: center;
    border-radius: 8px;
  }

  .channel-item.active {
    border-left-color: transparent;
    border-bottom-color: var(--accent);
  }

  .ch-info { min-width: unset; }
  .ch-tag { display: none; }

  .custom-input-wrap { display: none; }
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">INTERNATIONALS<span>.TV</span></div>
  <div class="live-badge">
    <div class="live-dot"></div>
    LIVE
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">CHANNELS</div>

    <div class="channel-list" id="channelList">
      <!-- каналы генерируются JS -->
    </div>

    <!-- Custom stream -->
    <div class="custom-input-wrap">
      <label>ВСТАВЬ СВОЙ .M3U8</label>
      <input
        class="custom-input"
        id="customUrl"
        type="text"
        placeholder="https://…/stream.m3u8"
      />
      <button class="custom-btn" onclick="playCustom()">▶ PLAY</button>
    </div>
  </aside>

  <!-- PLAYER -->
  <div class="player-wrap">
    <div class="video-container">

      <video id="video" autoplay muted playsinline controls></video>

      <!-- loading spinner -->
      <div class="overlay">
        <div class="spinner" id="spinner"></div>
      </div>

      <!-- error -->
      <div class="error-msg" id="errorMsg">
        <div class="error-icon">📡</div>
        <div class="error-text">Канал недоступен или поток не найден.<br>Попробуй другой канал или вставь свой .m3u8</div>
      </div>

    </div>

    <div class="status-bar">
      <div class="now-playing" id="nowPlaying">Выбери канал</div>
      <div class="stream-quality" id="streamQuality">HLS</div>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════
//  КАНАЛЫ — МЕНЯЙ / ДОБАВЛЯЙ СЮДА
//  url: ссылка на .m3u8 поток
// ═══════════════════════════════════════════

const CHANNELS = [

  // ══ КАМЕРЫ МИРА ══
  {
    name: "🏔 Swiss Alps Cam",
    tag: "WEBCAM • ШВЕЙЦАРИЯ",
    icon: "🇨🇭",
    url: "https://webcam.cdn.skylinewebcams.com/wengen.m3u8"
  },
  {
    name: "🌊 Amalfi Coast",
    tag: "WEBCAM • ИТАЛИЯ",
    icon: "🇮🇹",
    url: "https://webcam.cdn.skylinewebcams.com/positano.m3u8"
  },
  {
    name: "🗼 Rome Live",
    tag: "WEBCAM • РИМ",
    icon: "🏛",
    url: "https://webcam.cdn.skylinewebcams.com/rome.m3u8"
  },
  {
    name: "🌋 Etna Volcano",
    tag: "WEBCAM • ВУЛКАН ЭТНА",
    icon: "🌋",
    url: "https://webcam.cdn.skylinewebcams.com/etna.m3u8"
  },

  // ══ РЕЛАКС РАДИО ══
  {
    name: "🎵 Lofi Chill",
    tag: "RADIO • LOFI • 24/7",
    icon: "🎧",
    url: "https://streams.ilovemusic.de/iloveradio17.mp3"
    // iLoveRadio Chillout — стабильный поток
  },
  {
    name: "🌙 Chillout Zone",
    tag: "RADIO • AMBIENT • 24/7",
    icon: "✨",
    url: "https://stream.liferadio.at/chillout/mp3-192/app/"
    // LifeRadio Chill — Австрия, 192kbps
  },
  {
    name: "🎷 Jazz & Soul",
    tag: "RADIO • JAZZ • 24/7",
    icon: "🎷",
    url: "https://streams.ilovemusic.de/iloveradio9.mp3"
    // iLoveRadio Jazz
  },
  {
    name: "🌊 Ambient Waves",
    tag: "RADIO • AMBIENT",
    icon: "🌊",
    url: "https://streams.ilovemusic.de/iloveradio2.mp3"
  },

  // ══ НОВОСТИ / КУЛЬТУРА ══
  {
    name: "📺 DW English",
    tag: "NEWS • DEUTSCH WELLE",
    icon: "🌍",
    url: "https://dwamdstream102.akamaized.net/hls/live/2015525/dwstream102/stream05/streamPlaylist.m3u8"
    // Deutsche Welle официальный Akamai поток
  },
  {
    name: "🎬 ARTE Culture",
    tag: "КИНО • КУЛЬТУРА • EU",
    icon: "🎬",
    url: "https://artesimulcast.akamaized.net/hls/live/2031003/artelive_fr/index.m3u8"
    // ARTE — европейское культурное ТВ, показывает авторское кино
  },

  // ══ ТЕСТ ══
  {
    name: "🔧 Test Stream",
    tag: "HLS TEST • ВСЕГДА РАБОТАЕТ",
    icon: "🔧",
    url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
  },

  // ══ СВОИ КАНАЛЫ ══
  // {
  //   name: "Мой канал",
  //   tag: "CUSTOM",
  //   icon: "📡",
  //   url: "https://твойсервер/live/channel.m3u8"
  // },
];

// ═══════════════════════════════════════════

const video    = document.getElementById('video');
const spinner  = document.getElementById('spinner');
const errorMsg = document.getElementById('errorMsg');
const nowPlaying = document.getElementById('nowPlaying');
const streamQuality = document.getElementById('streamQuality');

let hls = null;
let activeIndex = -1;

function buildChannelList() {
  const list = document.getElementById('channelList');
  list.innerHTML = '';
  CHANNELS.forEach((ch, i) => {
    const item = document.createElement('div');
    item.className = 'channel-item';
    item.dataset.index = i;
    item.innerHTML = `
      <div class="ch-icon">${ch.icon}</div>
      <div class="ch-info">
        <div class="ch-name">${ch.name}</div>
        <div class="ch-tag">${ch.tag}</div>
      </div>
    `;
    item.addEventListener('click', () => playChannel(i));
    list.appendChild(item);
  });
}

function setActive(index) {
  document.querySelectorAll('.channel-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });
  activeIndex = index;
}

function showSpinner(show) {
  spinner.classList.toggle('active', show);
}

function showError(show) {
  errorMsg.classList.toggle('show', show);
}

function playUrl(url, label) {
  showError(false);
  showSpinner(true);
  nowPlaying.textContent = label;

  if (hls) { hls.destroy(); hls = null; }

  if (Hls.isSupported()) {
    hls = new Hls({
      enableWorker: true,
      lowLatencyMode: true,
      maxBufferLength: 30,
      backBufferLength: 60,
    });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      showSpinner(false);
      video.play().catch(() => {});
    });
    hls.on(Hls.Events.LEVEL_LOADED, (e, data) => {
      const level = hls.levels[hls.currentLevel];
      if (level) streamQuality.textContent = level.height ? level.height + 'p' : 'HLS';
    });
    hls.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) {
        showSpinner(false);
        showError(true);
      }
    });
  }
  // Safari native HLS
  else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.addEventListener('loadedmetadata', () => {
      showSpinner(false);
      video.play().catch(() => {});
    }, { once: true });
    video.addEventListener('error', () => {
      showSpinner(false);
      showError(true);
    }, { once: true });
  } else {
    showSpinner(false);
    showError(true);
    nowPlaying.textContent = 'HLS не поддерживается браузером';
  }
}

function playChannel(index) {
  const ch = CHANNELS[index];
  setActive(index);
  playUrl(ch.url, ch.name);
}

function playCustom() {
  const url = document.getElementById('customUrl').value.trim();
  if (!url) return;
  setActive(-1);
  playUrl(url, 'Custom Stream');
}

// Init
buildChannelList();

// Autoplay first channel on load
setTimeout(() => playChannel(0), 300);
</script>

</body>
</html>
